<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空戰機 - 六大魔王射擊遊戲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; -webkit-touch-callout: none; }
canvas { display: block; cursor: none; position: fixed; top: 0; left: 0; touch-action: none; -webkit-user-select: none; user-select: none; }
#ui-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#splash-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 200; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  background: #000; cursor: pointer;
}
#splash-screen img {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover;
}
#splash-screen .splash-hint {
  position: relative; z-index: 1;
  color: #fff; font-size: 1.4em; letter-spacing: 6px;
  text-shadow: 0 0 15px #0ff, 0 0 30px #08f;
  margin-bottom: 60px;
  animation: blinkHint 1.2s ease-in-out infinite;
}
@keyframes blinkHint {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}
#start-screen, #gameover-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; pointer-events: auto;
}
#start-screen { background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 70%); display: none; }
#gameover-screen { background: rgba(0,0,0,0.9); display: none; }
.game-title {
  font-size: 4em; color: #0ff; text-shadow: 0 0 20px #0ff, 0 0 40px #08f, 0 0 80px #04f;
  font-weight: 900; letter-spacing: 8px; margin-bottom: 10px;
  animation: titlePulse 2s ease-in-out infinite;
}
.game-subtitle {
  font-size: 1.5em; color: #f0f; text-shadow: 0 0 10px #f0f;
  margin-bottom: 40px; letter-spacing: 4px;
}
@keyframes titlePulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.btn {
  padding: 15px 60px; font-size: 1.3em; border: 2px solid #0ff;
  background: rgba(0,255,255,0.1); color: #0ff; cursor: pointer;
  letter-spacing: 3px; transition: all 0.3s; border-radius: 5px;
  text-transform: uppercase; margin: 10px;
}
.btn:hover {
  background: rgba(0,255,255,0.3); box-shadow: 0 0 30px rgba(0,255,255,0.5);
  transform: scale(1.05);
}
.controls-info {
  color: #8af; font-size: 0.9em; margin-top: 30px; text-align: center;
  line-height: 2;
}
.controls-info span { color: #ff0; font-weight: bold; }
#final-score { font-size: 3em; color: #ff0; text-shadow: 0 0 20px #ff0; margin: 20px; }
.go-title { font-size: 2.5em; color: #f44; text-shadow: 0 0 20px #f44; margin-bottom: 10px; }
/* Volume Control */
#volume-panel {
  position: fixed; top: 10px; right: 10px; z-index: 150;
  pointer-events: auto; display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,20,0.7); border: 1px solid rgba(0,255,255,0.3);
  border-radius: 20px; padding: 6px 14px; backdrop-filter: blur(5px);
}
#volume-panel label { color: #8cf; font-size: 13px; cursor: pointer; user-select: none; }
#volume-panel input[type=range] {
  width: 80px; height: 4px; -webkit-appearance: none; appearance: none;
  background: linear-gradient(to right, #0ff, #08f); border-radius: 2px; outline: none; cursor: pointer;
}
#volume-panel input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: #0ff; border-radius: 50%; border: none; cursor: pointer;
}
#volume-panel .vol-val { color: #0ff; font-size: 12px; min-width: 28px; text-align: center; }
#mute-btn { background: none; border: none; color: #0ff; font-size: 18px; cursor: pointer; padding: 0 2px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="volume-panel">
  <button id="mute-btn" onclick="toggleMute()">🔊</button>
  <label for="vol-slider">音量</label>
  <input type="range" id="vol-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
  <span class="vol-val" id="vol-val">50</span>
</div>

<div id="splash-screen">
  <img id="splash-img" alt="太空戰機">
  <div class="splash-hint">— 按任意鍵開始 —</div>
</div>

<div id="start-screen">
  <div class="game-title">太空戰機</div>
  <div class="game-subtitle">✦ 六大魔王降臨 ✦</div>
  <button class="btn" onclick="startGame()">開始遊戲</button>
  <div class="controls-info">
    <span>滑鼠</span> 或 <span>方向鍵</span> 移動戰機<br>
    自動射擊 | <span>滑鼠左鍵/雙擊螢幕</span> 防護罩(每關5次) | <span>W</span> 超級炸彈<br>
    擊敗蜜蜂大軍，挑戰六大魔王！
  </div>
</div>

<div id="gameover-screen">
  <div class="go-title">遊戲結束</div>
  <div id="final-score">0</div>
  <button class="btn" onclick="restartGame()">再來一次</button>
</div>

<script>
// ====== SOUND ENGINE (Web Audio API) ======
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let masterGain = null;
let sfxVolume = 0.5;
let bgmVolume = 0.3;
let isMuted = false;
let bgmInterval = null;
let bgmPlaying = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = sfxVolume;
  masterGain.connect(audioCtx.destination);
}

function setVolume(v) {
  sfxVolume = v / 100;
  document.getElementById('vol-val').textContent = v;
  if (masterGain) masterGain.gain.value = isMuted ? 0 : sfxVolume;
  bgmVolume = sfxVolume * 0.35;
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = isMuted ? 0 : sfxVolume;
}

// Generic tone player
function playTone(freq, type, duration, vol, detune, attack, decay) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  if (detune) osc.detune.value = detune;
  gain.gain.setValueAtTime(0.001, t);
  gain.gain.linearRampToValueAtTime((vol || 0.3), t + (attack || 0.01));
  gain.gain.exponentialRampToValueAtTime(0.001, t + (duration || 0.2));
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(t);
  osc.stop(t + (duration || 0.2) + 0.05);
}

// Noise generator for explosions
function playNoise(duration, vol, filterFreq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * (duration || 0.3);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = filterFreq || 2000;
  filter.frequency.exponentialRampToValueAtTime(100, t + (duration || 0.3));
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + (duration || 0.3));
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start(t);
  src.stop(t + (duration || 0.3) + 0.05);
}

// ---- Sound Effects ----
const SFX = {
  shoot() {
    playTone(800, 'square', 0.06, 0.08, Math.random()*20);
    playTone(600, 'sine', 0.04, 0.05);
  },
  laser() {
    playTone(200, 'sawtooth', 0.15, 0.12, 0, 0.01, 0.1);
    playTone(150, 'square', 0.12, 0.06, -10);
  },
  enemyHit() {
    playTone(300, 'square', 0.05, 0.06);
  },
  enemyDie() {
    playNoise(0.2, 0.15, 1500);
    playTone(200, 'sine', 0.15, 0.1);
    playTone(120, 'sine', 0.2, 0.08);
  },
  bossHit() {
    playTone(180, 'square', 0.06, 0.08, Math.random()*30);
    playNoise(0.05, 0.05, 1000);
  },
  bossDie() {
    playNoise(0.6, 0.35, 3000);
    playTone(100, 'sawtooth', 0.5, 0.2);
    playTone(60, 'sine', 0.8, 0.2);
    setTimeout(() => { playNoise(0.4, 0.25, 2000); playTone(80, 'sine', 0.4, 0.15); }, 150);
    setTimeout(() => { playNoise(0.5, 0.3, 2500); playTone(50, 'sawtooth', 0.6, 0.2); }, 350);
  },
  bossAppear() {
    playTone(80, 'sawtooth', 0.6, 0.2, 0, 0.05);
    playTone(100, 'square', 0.5, 0.1, 10, 0.1);
    setTimeout(() => playTone(120, 'sawtooth', 0.4, 0.15, 0, 0.05), 200);
    setTimeout(() => playTone(150, 'sine', 0.3, 0.12), 400);
  },
  playerHit() {
    playNoise(0.25, 0.2, 2000);
    playTone(150, 'square', 0.2, 0.15, -20);
    playTone(80, 'sine', 0.3, 0.1);
  },
  shield() {
    playTone(500, 'sine', 0.15, 0.12);
    playTone(700, 'sine', 0.12, 0.1);
    setTimeout(() => playTone(900, 'sine', 0.2, 0.12), 80);
  },
  bomb() {
    playNoise(0.8, 0.4, 4000);
    playTone(60, 'sawtooth', 0.7, 0.3, 0, 0.01);
    playTone(40, 'sine', 1.0, 0.2);
    setTimeout(() => playNoise(0.5, 0.3, 2000), 200);
  },
  powerup() {
    playTone(600, 'sine', 0.08, 0.1);
    setTimeout(() => playTone(800, 'sine', 0.08, 0.1), 60);
    setTimeout(() => playTone(1000, 'sine', 0.08, 0.1), 120);
    setTimeout(() => playTone(1200, 'sine', 0.15, 0.12), 180);
  },
  upgrade() {
    playTone(400, 'sine', 0.08, 0.12);
    setTimeout(() => playTone(600, 'sine', 0.08, 0.12), 70);
    setTimeout(() => playTone(800, 'sine', 0.08, 0.12), 140);
    setTimeout(() => playTone(1000, 'sine', 0.1, 0.12), 210);
    setTimeout(() => playTone(1200, 'sine', 0.2, 0.15), 280);
  },
  gameOver() {
    playTone(400, 'sawtooth', 0.3, 0.15);
    setTimeout(() => playTone(300, 'sawtooth', 0.3, 0.15), 250);
    setTimeout(() => playTone(200, 'sawtooth', 0.3, 0.15), 500);
    setTimeout(() => playTone(100, 'sawtooth', 0.6, 0.2), 750);
  },
  stageStart() {
    playTone(500, 'sine', 0.1, 0.1);
    setTimeout(() => playTone(600, 'sine', 0.1, 0.1), 100);
    setTimeout(() => playTone(800, 'sine', 0.2, 0.15), 200);
  },
  wingman() {
    playTone(700, 'sine', 0.1, 0.1);
    setTimeout(() => playTone(900, 'sine', 0.1, 0.1), 80);
    setTimeout(() => playTone(1100, 'sine', 0.15, 0.12), 160);
  }
};

// ---- Background Music (procedural) ----
let bgmNoteIndex = 0;
const bgmMelody = [130,155,175,195,175,155,130,110, 155,175,195,220,195,175,155,130];
const bgmBass = [65,65,78,78,87,87,65,65];

function startBGM() {
  if (bgmPlaying || !audioCtx) return;
  bgmPlaying = true;
  bgmNoteIndex = 0;
  bgmInterval = setInterval(() => {
    if (!audioCtx || isMuted) return;
    const t = audioCtx.currentTime;
    const v = bgmVolume * sfxVolume;
    if (v < 0.001) return;
    // Melody
    const mNote = bgmMelody[bgmNoteIndex % bgmMelody.length];
    const mOsc = audioCtx.createOscillator();
    const mGain = audioCtx.createGain();
    mOsc.type = 'triangle';
    mOsc.frequency.value = mNote;
    mGain.gain.setValueAtTime(v * 0.15, t);
    mGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    mOsc.connect(mGain); mGain.connect(masterGain);
    mOsc.start(t); mOsc.stop(t + 0.3);
    // Bass (every 2 beats)
    if (bgmNoteIndex % 2 === 0) {
      const bNote = bgmBass[(bgmNoteIndex/2) % bgmBass.length];
      const bOsc = audioCtx.createOscillator();
      const bGain = audioCtx.createGain();
      bOsc.type = 'sine';
      bOsc.frequency.value = bNote;
      bGain.gain.setValueAtTime(v * 0.2, t);
      bGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      bOsc.connect(bGain); bGain.connect(masterGain);
      bOsc.start(t); bOsc.stop(t + 0.45);
    }
    bgmNoteIndex++;
  }, 280);
}

function stopBGM() {
  if (bgmInterval) clearInterval(bgmInterval);
  bgmPlaying = false;
}

let bullets = [];
let lasers = [];
let enemies = [];
let enemyBullets = [];
let bossLasers = [];
let particles = [];
let powerups = [];
let wingmen = [];
let stars = [];

// ====== STARS BACKGROUND ======
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 2 + 0.5,
      brightness: Math.random(),
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

// ====== PLAYER ======
class Player {
  constructor() {
    this.x = canvas.width / 2;
    this.y = canvas.height - 100;
    this.w = 70;
    this.h = 56;
    this.speed = 7;
    this.shootTimer = 0;
    this.laserTimer = 0;
    this.thrustAnim = 0;
  }
  update() {
    this.thrustAnim += 0.15;
    // Engine trail particles
    if (game.running && Math.random() < 0.2) {
      particles.length < 150 && particles.push({
        x: this.x + (Math.random()-0.5)*14,
        y: this.y + this.h/2 + 5,
        vx: (Math.random()-0.5)*1.5,
        vy: Math.random()*3+2,
        life: 12+Math.random()*8, maxLife: 20,
        size: Math.random()*3+1,
        color: Math.random()>0.5 ? '#f80' : '#ff0', type: 'circle'
      });
    }
    // Keyboard
    if (game.keys['ArrowLeft'] || game.keys['a']) this.x -= this.speed * 1.5;
    if (game.keys['ArrowRight'] || game.keys['d']) this.x += this.speed * 1.5;
    if (game.keys['ArrowUp'] || game.keys['w']) this.y -= this.speed * 1.5;
    if (game.keys['ArrowDown'] || game.keys['s']) this.y += this.speed * 1.5;
    // Mouse/Touch - near-instant tracking
    if (game.inputActive) {
      let dx = game.targetX - this.x;
      let dy = game.targetY - this.y;
      let dist = Math.sqrt(dx*dx+dy*dy);
      if (dist > 0.5) {
        // Almost instant: very high lerp factor
        let t = dist < 3 ? 0.6 : dist < 15 ? 0.8 : 0.92;
        this.x += dx * t;
        this.y += dy * t;
      }
    }
    // Clamp
    this.x = Math.max(this.w/2, Math.min(canvas.width - this.w/2, this.x));
    this.y = Math.max(this.h/2, Math.min(canvas.height - this.h/2, this.y));
    // Auto shoot
    this.shootTimer++;
    this.laserTimer++;
    if (game.weaponLevel <= 3) {
      if (this.shootTimer >= 7) { this.shootTimer = 0; this.fireBullets(); }
    } else {
      if (this.shootTimer >= 5) { this.shootTimer = 0; this.fireBullets(); }
      if (this.laserTimer >= 16) { this.laserTimer = 0; this.fireLasers(); }
    }
  }
  fireBullets() {
    SFX.shoot();
    let lvl = game.weaponLevel;
    if (lvl >= 1) bullets.push(new Bullet(this.x, this.y - this.h/2, 0, -15));
    if (lvl >= 2) {
      bullets.push(new Bullet(this.x - 14, this.y - this.h/2 + 5, -1, -14));
      bullets.push(new Bullet(this.x + 14, this.y - this.h/2 + 5, 1, -14));
    }
    if (lvl >= 3) {
      bullets.push(new Bullet(this.x - 24, this.y - this.h/2 + 8, -2, -13));
      bullets.push(new Bullet(this.x + 24, this.y - this.h/2 + 8, 2, -13));
    }
    if (lvl >= 5) {
      // Extra rear-angle shots
      bullets.push(new Bullet(this.x - 30, this.y, -3, -11));
      bullets.push(new Bullet(this.x + 30, this.y, 3, -11));
    }
  }
  fireLasers() {
    SFX.laser();
    let lvl = game.weaponLevel;
    if (lvl >= 4) {
      lasers.push(new Laser(this.x, this.y - this.h/2));
    }
    if (lvl >= 5) {
      lasers.push(new Laser(this.x - 28, this.y - this.h/2 + 5));
      lasers.push(new Laser(this.x + 28, this.y - this.h/2 + 5));
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // Invincible blink
    if (game.invincible && Math.floor(frameCount / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    // Shield - Purple Aura
    if (game.shieldActive) {
      let st = frameCount * 0.06;
      let pulse = 1 + Math.sin(st * 2) * 0.06;
      // Outer glow field
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = '#a040ff';
      ctx.beginPath();
      ctx.arc(0, 0, 60 * pulse, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Rotating hex ring
      ctx.save();
      ctx.rotate(st * 0.8);
      ctx.strokeStyle = 'rgba(200,100,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= 6; i++) {
        let a = (Math.PI*2/6) * i;
        let rx = Math.cos(a) * 48 * pulse, ry = Math.sin(a) * 48 * pulse;
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
      }
      ctx.stroke();
      ctx.restore();
      // Counter-rotating inner hex
      ctx.save();
      ctx.rotate(-st * 1.2);
      ctx.strokeStyle = 'rgba(160,0,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i <= 6; i++) {
        let a = (Math.PI*2/6) * i + Math.PI/6;
        let rx = Math.cos(a) * 36 * pulse, ry = Math.sin(a) * 36 * pulse;
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
      }
      ctx.stroke();
      ctx.restore();
      // Energy arcs
      ctx.strokeStyle = 'rgba(200,140,255,0.6)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        let arcStart = st * 1.5 + (Math.PI*2/3) * i;
        ctx.beginPath();
        ctx.arc(0, 0, 52 * pulse, arcStart, arcStart + 0.8);
        ctx.stroke();
      }
      // Sparkle particles
      for (let i = 0; i < 6; i++) {
        let pa = st * 0.5 + (Math.PI*2/8) * i;
        let pr = 44 + Math.sin(st * 3 + i * 1.5) * 8;
        let px = Math.cos(pa) * pr * pulse;
        let py = Math.sin(pa) * pr * pulse;
        let ps = 1.5 + Math.sin(st * 4 + i) * 1;
        ctx.beginPath();
        ctx.arc(px, py, ps, 0, Math.PI*2);
        ctx.fillStyle = `rgba(220,180,255,${0.4 + Math.sin(st*5+i)*0.3})`;
        ctx.fill();
      }
    }
    // Engine glow
    let glow = 8 + Math.sin(this.thrustAnim) * 4;
    // Thrust flames (behind the ship)
    ctx.beginPath();
    ctx.moveTo(-12, this.h/2 - 5);
    ctx.lineTo(-4, this.h/2 + 12 + glow);
    ctx.lineTo(4, this.h/2 + 12 + glow);
    ctx.lineTo(12, this.h/2 - 5);
    ctx.fillStyle = '#f80';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-8, this.h/2 - 5);
    ctx.lineTo(-2, this.h/2 + 6 + glow * 0.6);
    ctx.lineTo(2, this.h/2 + 6 + glow * 0.6);
    ctx.lineTo(8, this.h/2 - 5);
    ctx.fillStyle = '#ff0';
    ctx.fill();
    // Draw the ship image
    if (playerImgReady) {
      ctx.drawImage(playerImg, -this.w/2, -this.h/2, this.w, this.h);
    } else {
      // Fallback rectangle
      ctx.fillStyle = '#f44';
      ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
    }
    ctx.restore();
  }
}

// ====== BULLET ======
class Bullet {
  constructor(x, y, vx, vy) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.w = 7; this.h = 7; this.alive = true;
    this.trail = [];
    this.anim = Math.random() * Math.PI * 2;
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 5) this.trail.shift();
    this.x += this.vx; this.y += this.vy;
    this.anim += 0.3;
    if (this.y < -20 || this.y > canvas.height + 20) this.alive = false;
    // Cyan trail particles
    if (Math.random() < 0.4) {
      particles.length < 150 && particles.push({
        x: this.x + (Math.random()-0.5)*4,
        y: this.y + 5,
        vx: (Math.random()-0.5)*1.5, vy: Math.random()*2+1,
        life: 8+Math.random()*5, maxLife: 13,
        size: Math.random()*2.5+1,
        color: ['#0ff','#0cf','#4ef','#0ef'][Math.floor(Math.random()*4)],
        type: 'circle'
      });
    }
  }
  draw() {
    ctx.save();
    // Fire trail
    for (let i = 0; i < this.trail.length; i++) {
      let t = this.trail[i];
      let alpha = (i+1) / (this.trail.length+1) * 0.5;
      let sz = 3 + i * 0.5;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#0cf';
      ctx.beginPath();
      ctx.arc(t.x, t.y, sz, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Outer glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#0ff';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 8, 0, Math.PI*2);
    ctx.fill();
    // Main orb
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#0ef';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 4.5, 0, Math.PI*2);
    ctx.fill();
    // Hot core
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#aff';
    ctx.beginPath();
    ctx.arc(this.x, this.y - 1, 2.5, 0, Math.PI*2);
    ctx.fill();
    // White center
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(this.x, this.y - 1.5, 1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ====== LASER ======
class Laser {
  constructor(x, y) {
    let lvl = game.laserLevel;
    this.lvl = lvl;
    this.x = x; this.y = y;
    // Width scales with level: 14 → 22 → 32 → 44 → 60
    this.w = [14, 22, 32, 44, 60][Math.min(lvl, 5) - 1] || 14;
    this.h = 80 + lvl * 10;
    this.dmg = 2 + lvl;
    this.alive = true; this.life = 12 + lvl;
    this.anim = Math.random() * Math.PI * 2;
  }
  update() {
    this.y -= 18;
    this.anim += 0.5;
    this.life--;
    if (this.life <= 0 || this.y < -100) this.alive = false;
    // Purple trail particles
    if (Math.random() < 0.3) {
      particles.length < 150 && particles.push({
        x: this.x + (Math.random()-0.5)*this.w, y: this.y + this.h/2,
        vx: (Math.random()-0.5)*2, vy: Math.random()*2+1,
        life: 15+Math.random()*10, maxLife: 25,
        size: Math.random()*3+1, color: Math.random()>0.5 ? '#c060ff' : '#a040ff', type: 'circle'
      });
    }
  }
  draw() {
    ctx.save();
    let hw = this.w/2;
    // Outer glow
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#a040ff';
    ctx.fillRect(this.x - hw*1.3, this.y - this.h/2, this.w*1.3, this.h);
    // Main beam
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#b060ff';
    ctx.fillRect(this.x - hw, this.y - this.h/2, this.w, this.h);
    // Core
    ctx.globalAlpha = 0.95;
    ctx.fillStyle = '#e0c0ff';
    let coreW = Math.max(3, this.w * 0.25);
    ctx.fillRect(this.x - coreW/2, this.y - this.h/2, coreW, this.h);
    ctx.globalAlpha = 1;
    // Edge lightning (level 2+)
    if (this.lvl >= 2) {
      ctx.strokeStyle = 'rgba(180,100,255,0.4)';
      ctx.lineWidth = 1;
      for (let side = -1; side <= 1; side += 2) {
        ctx.beginPath();
        let sx = this.x + side * hw * 0.8;
        ctx.moveTo(sx, this.y - this.h/2);
        for (let j = 0; j < 3; j++) {
          ctx.lineTo(sx + (Math.random()-0.5)*hw*0.5, this.y - this.h/2 + (this.h/3)*(j+1));
        }
        ctx.stroke();
      }
    }
    // Ring pulses (level 4+)
    if (this.lvl >= 4) {
      ctx.strokeStyle = 'rgba(180,80,255,0.35)';
      ctx.lineWidth = 2;
      for (let r = 0; r < 2; r++) {
        let ry = this.y - this.h/2 + ((this.anim * 40 + r * 50) % this.h);
        ctx.beginPath();
        ctx.moveTo(this.x - hw, ry); ctx.lineTo(this.x + hw, ry);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

// ====== ENEMY ======
class Enemy {
  constructor(type) {
    this.type = type; // 'bee', 'queen', 'medium'
    this.x = Math.random() * (canvas.width - 80) + 40;
    this.y = -40;
    this.alive = true;
    this.shootTimer = Math.random() * 120 + 60;
    this.moveType = Math.floor(Math.random() * 3); // 0=straight,1=zigzag,2=sine
    this.movePhase = Math.random() * Math.PI * 2;
    this.baseX = this.x;
    this.anim = 0;
    if (type === 'bee') {
      this.imgIdx = 0;
      this.w = 35; this.h = 33; this.hp = 1; this.maxHp = 1;
      this.speed = 2.5 + Math.random() * 1.2; this.score = 50; this.color = '#0cf';
    } else if (type === 'queen') {
      this.imgIdx = 1;
      this.w = 44; this.h = 42; this.hp = 2; this.maxHp = 2;
      this.speed = 2 + Math.random(); this.score = 100; this.color = '#08f';
    } else {
      this.imgIdx = Math.random() > 0.5 ? 0 : 1;
      this.w = 50; this.h = 48; this.hp = 3; this.maxHp = 3;
      this.speed = 1.5 + Math.random() * 0.8; this.score = 150;
      this.color = `hsl(${Math.random()*360},80%,60%)`;
    }
  }
  update() {
    this.anim += 0.1;
    this.movePhase += 0.03;
    this.y += this.speed;
    if (this.moveType === 1) {
      this.x += Math.sin(this.movePhase * 3) * 3;
    } else if (this.moveType === 2) {
      this.x = this.baseX + Math.sin(this.movePhase) * 60;
    }
    this.x = Math.max(this.w/2, Math.min(canvas.width - this.w/2, this.x));
    if (this.y > canvas.height + 50) this.alive = false;
    this.shootTimer--;
    if (this.shootTimer <= 0) {
      this.shootTimer = 80 + Math.random() * 80;
      this.shoot();
    }
  }
  shoot() {
    if (!player) return;
    let dx = player.x - this.x;
    let dy = player.y - this.y;
    let d = Math.sqrt(dx*dx+dy*dy);
    if (d === 0) d = 1;
    let spd = 4;
    enemyBullets.push({
      x: this.x, y: this.y + this.h/2,
      vx: (dx/d) * spd, vy: (dy/d) * spd,
      w: 6, h: 6, alive: true, color: '#f44'
    });
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // Draw enemy ship image
    let eImg = enemyImgs[this.imgIdx];
    if (eImg && eImg.complete) {
      let scale = 1;
      if (this.type === 'bee') {
        scale = 1.0;
      } else if (this.type === 'queen') {
        scale = 1.2;
      } else {
        scale = 1.4;
      }
      let dw = this.w * scale, dh = this.h * scale;
      ctx.drawImage(eImg, -dw/2, -dh/2, dw, dh);
      // Thruster flames (on top since ship is flipped)
      let glow = 4 + Math.sin(this.anim * 3) * 3;
      ctx.beginPath();
      ctx.moveTo(-6, -this.h/2 - 2);
      ctx.lineTo(0, -this.h/2 - 8 - glow);
      ctx.lineTo(6, -this.h/2 - 2);
      ctx.fillStyle = '#f60';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-3, -this.h/2 - 2);
      ctx.lineTo(0, -this.h/2 - 5 - glow * 0.5);
      ctx.lineTo(3, -this.h/2 - 2);
      ctx.fillStyle = '#ff0';
      ctx.fill();
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.w/2, 0, Math.PI*2);
      ctx.fill();
    }
    // HP bar
    if (this.maxHp > 1) {
      let bw = this.w + 6;
      let hpRatio = this.hp / this.maxHp;
      let barW = bw * hpRatio;
      let barY = -this.h/2 - 8;
      ctx.save();
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(255,60,60,0.8)';
      

      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-bw/2, barY);
      ctx.lineTo(-bw/2 + barW, barY);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }
}

// ====== BOSS ======
class Boss {
  constructor(stageIndex) {
    let bossIdx = stageIndex % 6;
    this.bossData = BOSSES[bossIdx];
    this.bossIdx = bossIdx;
    this.x = canvas.width / 2;
    this.y = -80;
    this.targetY = 100;
    this.w = 130;
    this.h = 120;
    this.hp = this.bossData.hp + Math.floor(stageIndex / 6) * 180;
    this.maxHp = this.hp;
    this.alive = true;
    this.phase = 0;
    this.attackTimer = 0;
    this.specialTimer = 0;
    this.moveDir = 1;
    this.anim = 0;
    this.entering = true;
  }
  update() {
    this.anim += 0.05;
    // Aura trail particles
    if (!this.entering && Math.random() < 0.2) {
      let trailColors = [['#a0f','#c6f','#80a','#e0f'],['#f80','#fa0','#f60','#ff0'],['#0c4','#4f4','#0a0','#8f4'],['#08f','#0af','#06c','#4cf'],['#f80','#fa0','#f60','#ff0'],['#a0f','#c6f','#80a','#e0f']];
      let tc = trailColors[this.bossIdx];
      particles.length < 150 && particles.push({
        x: this.x + (Math.random()-0.5)*this.w,
        y: this.y + (Math.random()-0.5)*this.h*0.5,
        vx: (Math.random()-0.5)*2,
        vy: -Math.random()*3-1,
        life: 15+Math.random()*10, maxLife: 25,
        size: Math.random()*4+2,
        color: tc[Math.floor(Math.random()*4)],
        type: 'circle'
      });
    }
    if (this.entering) {
      this.y += 3;
      if (this.y >= this.targetY) { this.y = this.targetY; this.entering = false; }
      return;
    }
    // Move
    this.x += this.moveDir * 2.5;
    if (this.x > canvas.width - 80) this.moveDir = -1;
    if (this.x < 80) this.moveDir = 1;
    // Attack
    this.attackTimer++;
    this.specialTimer++;
    if (this.attackTimer >= 35) {
      this.attackTimer = 0;
      this.basicAttack();
    }
    if (this.specialTimer >= 100) {
      this.specialTimer = 0;
      this.specialAttack();
    }
  }
  basicAttack() {
    let count = 4 + Math.floor(game.cycle * 0.5);
    for (let i = 0; i < count; i++) {
      let angle = (Math.PI / (count - 1 || 1)) * i + Math.PI * 0.2;
      let spd = 5;
      enemyBullets.push({
        x: this.x + (Math.random()-0.5)*40, y: this.y + this.h/2,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        w: 9, h: 9, alive: true, color: '#f80'
      });
    }
  }
  specialAttack() {
    let elem = this.bossData.element;
    let c = this.bossData.color;
    // Boss energy drops
    for (let i = 0; i < 4; i++) {
      enemyBullets.push({
        x: this.x + (i-1.5)*30, y: this.y + this.h/2 + 10,
        vx: (i-1.5)*0.8, vy: 5 + Math.random(),
        w: 10, h: 10, alive: true, color: c
      });
    }
    // Purple laser beam (all bosses fire it)
    bossLasers.push(new BossLaser(this.x + (Math.random()-0.5)*60, this.y + this.h/2));
    if (elem === 'fire') {
      // Spiral fire burst
      for (let i = 0; i < 16; i++) {
        let a = (Math.PI*2/16) * i + this.anim * 2;
        enemyBullets.push({
          x: this.x, y: this.y,
          vx: Math.cos(a) * 5, vy: Math.sin(a) * 5,
          w: 10, h: 10, alive: true, color: '#f60'
        });
      }
    } else if (elem === 'earth') {
      for (let i = 0; i < 6; i++) {
        enemyBullets.push({
          x: this.x + (Math.random()-0.5)*120, y: this.y + 30,
          vx: (Math.random()-0.5)*2, vy: 3.5 + Math.random()*2,
          w: 14, h: 14, alive: true, color: '#a85'
        });
      }
    } else if (elem === 'air') {
      for (let i = 0; i < 4; i++) {
        let tx = player ? player.x + (Math.random()-0.5)*100 : canvas.width/2;
        let dx = tx - this.x, dy = (player ? player.y : canvas.height) - this.y;
        let d = Math.sqrt(dx*dx+dy*dy) || 1;
        enemyBullets.push({
          x: this.x, y: this.y + 30,
          vx: (dx/d)*9, vy: (dy/d)*9,
          w: 6, h: 20, alive: true, color: '#4ff'
        });
      }
    } else {
      for (let i = 0; i < 10; i++) {
        let a = Math.PI * 0.15 + (Math.PI * 0.7 / 9) * i + Math.sin(this.anim) * 0.4;
        enemyBullets.push({
          x: this.x, y: this.y + 30,
          vx: Math.cos(a) * 4.5, vy: Math.sin(a) * 4.5,
          w: 8, h: 8, alive: true, color: '#48f'
        });
      }
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    let c = this.bossData.color;
    // Aura particles (color themed)
    let auraColors = [
      ['160,0,255','200,100,255'],  // purple
      ['255,60,0','255,120,40'],    // red  
      ['0,220,60','100,255,60'],    // green
      ['0,100,255','60,180,255'],   // blue
      ['255,140,0','255,200,60'],   // orange
      ['160,0,255','200,100,255'],  // purple mech
    ];
    let ac = auraColors[this.bossIdx];
    for (let i = 0; i < 3; i++) {
      let ax = (Math.random()-0.5) * this.w;
      let ay = (Math.random()-0.5) * this.h;
      let as = 5 + Math.random() * 10;
      ctx.beginPath();
      ctx.arc(ax, ay, as, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${Math.random()>0.5?ac[0]:ac[1]},${0.1+Math.random()*0.15})`;
      ctx.fill();
    }
    // Pulsing ring
    let pulse = 1 + Math.sin(this.anim * 2) * 0.08;
    ctx.beginPath();
    ctx.arc(0, 0, (this.w/2 + 15) * pulse, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${ac[0]},0.08)`;
    ctx.fill();
    // Draw boss image
    let bImg = bossImgs[this.bossIdx];
    if (bImg && bImg.complete) {
      let dw = this.w * pulse, dh = this.h * pulse;
      ctx.drawImage(bImg, -dw/2, -dh/2, dw, dh);
    } else {
      ctx.fillStyle = c;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(0, 0, this.w/2, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Boss symbol overlay
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.5 + Math.sin(this.anim * 3) * 0.25;
    ctx.fillText(this.bossData.symbol, 0, 0);
    ctx.globalAlpha = 1;
    // HP bar
    let bw = 130;
    let hpRatio = this.hp / this.maxHp;
    let barY = -this.h/2 - 16;
    let barColor = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#fa0' : '#f00';
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(-bw/2, barY);
    ctx.lineTo(bw/2, barY);
    ctx.stroke();
    ctx.strokeStyle = barColor;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-bw/2, barY);
    ctx.lineTo(-bw/2 + bw * hpRatio, barY);
    ctx.stroke();
    ctx.restore();
  }
}

// ====== BOSS LASER ======
class BossLaser {
  constructor(x, y) {
    this.x = x;
    this.startY = y;
    this.alive = true;
    this.phase = 'warn'; // 'warn' -> 'fire' -> dead
    this.warnTimer = 50;
    this.fireTimer = 0;
    this.maxFire = 90;
    this.beamW = 0;
    this.maxBeamW = 45;
    this.anim = 0;
    this.dmgCooldown = 0;
  }
  update() {
    this.anim += 0.15;
    if (this.phase === 'warn') {
      this.warnTimer--;
      if (this.warnTimer <= 0) {
        this.phase = 'fire';
        this.fireTimer = this.maxFire;
        game.screenShake = 6;
      }
    } else if (this.phase === 'fire') {
      // Beam expands quickly then sustains
      let t = 1 - this.fireTimer / this.maxFire;
      if (t < 0.1) {
        this.beamW = this.maxBeamW * (t / 0.1);
      } else if (t > 0.85) {
        this.beamW = this.maxBeamW * ((1 - t) / 0.15);
      } else {
        this.beamW = this.maxBeamW;
      }
      this.fireTimer--;
      this.dmgCooldown--;
      // Spawn particles along beam
      if (Math.random() < 0.3) {
        let py = this.startY + Math.random() * (canvas.height - this.startY);
        particles.length < 150 && particles.push({
          x: this.x + (Math.random()-0.5)*this.beamW,
          y: py,
          vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*2,
          life: 8+Math.random()*6, maxLife: 14,
          size: Math.random()*2+1,
          color: ['#c060ff','#a040ff'][Math.floor(Math.random()*2)],
          type: 'circle'
        });
      }
      if (this.fireTimer <= 0) this.alive = false;
    }
  }
  draw() {
    ctx.save();
    if (this.phase === 'warn') {
      // Flashing warning line
      let flash = Math.sin(this.anim * 6) > 0 ? 0.6 : 0.2;
      ctx.strokeStyle = `rgba(200,0,255,${flash})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(this.x, this.startY);
      ctx.lineTo(this.x, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
      // Warning triangle
      ctx.fillStyle = `rgba(255,100,255,${flash})`;
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚠', this.x, this.startY + 40);
    } else if (this.phase === 'fire') {
      let hw = this.beamW / 2;
      let beamH = canvas.height - this.startY;
      // Outer glow
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#a040ff';
      ctx.fillRect(this.x - hw*1.8, this.startY, hw*3.6, beamH);
      // Main beam
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#c080ff';
      ctx.fillRect(this.x - hw, this.startY, this.beamW, beamH);
      // Core
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#f0d0ff';
      let coreW = Math.max(4, this.beamW * 0.25);
      ctx.fillRect(this.x - coreW/2, this.startY, coreW, beamH);
      ctx.globalAlpha = 1;
      // Pulsing rings
      ctx.strokeStyle = 'rgba(255,200,255,0.4)';
      ctx.lineWidth = 2;
      for (let r = 0; r < 3; r++) {
        let ry = this.startY + ((this.anim * 50 + r * 100) % beamH);
        ctx.beginPath();
        ctx.moveTo(this.x - hw, ry); ctx.lineTo(this.x + hw, ry);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
}

// ====== PARTICLES ======
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    let a = Math.random() * Math.PI * 2;
    let spd = Math.random() * 5 + 1;
    particles.length < 150 && particles.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 30 + Math.random()*20, maxLife: 50,
      size: Math.random()*4+2, color, type: 'circle'
    });
  }
  // Spark lines
  for (let i = 0; i < Math.min(count, 5); i++) {
    let a = Math.random() * Math.PI * 2;
    let spd = Math.random() * 7 + 3;
    particles.length < 150 && particles.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 10 + Math.random()*8, maxLife: 18,
      size: 1.5, color: '#fff', type: 'spark'
    });
  }
}

function spawnBigExplosion(x, y) {
  let colors = ['#f44','#fa0','#ff0','#fff','#f80'];
  for (let i = 0; i < 50; i++) {
    let a = Math.random()*Math.PI*2;
    let spd = Math.random()*10+2;
    particles.length < 150 && particles.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 50+Math.random()*30, maxLife: 80,
      size: Math.random()*7+3,
      color: colors[Math.floor(Math.random()*colors.length)], type: 'circle'
    });
  }
  // Ring shockwave
  for (let i = 0; i < 24; i++) {
    let a = (Math.PI*2/24)*i;
    particles.length < 150 && particles.push({
      x, y, vx: Math.cos(a)*12, vy: Math.sin(a)*12,
      life: 15, maxLife: 15,
      size: 3, color: '#ff0', type: 'spark'
    });
  }
  // Screen shake effect
  game.screenShake = 10;
}

// ====== POWERUP ======
class Powerup {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.w = 26; this.h = 26;
    this.alive = true; this.anim = 0; this.vy = 2.5;
    // Types: 'weapon','laser','shield','bomb','life'
    if (!type) {
      let r = Math.random();
      if (r < 0.30) type = 'weapon';
      else if (r < 0.55) type = 'laser';
      else if (r < 0.72) type = 'shield';
      else if (r < 0.88) type = 'bomb';
      else type = 'life';
    }
    this.type = type;
    this.colors = {
      weapon: {fill:'#ff0', stroke:'#fa0', icon:'⬆'},
      laser:  {fill:'#c060ff', stroke:'#8040cc', icon:'⚡'},
      shield: {fill:'#c060ff', stroke:'#80c', icon:'🛡'},
      bomb:   {fill:'#f80', stroke:'#a50', icon:'💣'},
      life:   {fill:'#f44', stroke:'#a00', icon:'❤'},
    };
  }
  update() {
    this.y += this.vy;
    this.anim += 0.1;
    if (this.y > canvas.height + 30) this.alive = false;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    let c = this.colors[this.type];
    // Pulsing glow
    let s = 1 + Math.sin(this.anim * 3) * 0.15;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = c.fill;
    ctx.beginPath();
    ctx.arc(0, 0, 18 * s, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Shape
    ctx.rotate(this.anim * 0.5);
    if (this.type === 'laser') {
      // Diamond
      ctx.beginPath();
      ctx.moveTo(0, -13*s); ctx.lineTo(10*s, 0);
      ctx.lineTo(0, 13*s); ctx.lineTo(-10*s, 0);
      ctx.closePath();
    } else if (this.type === 'shield') {
      // Hexagon
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        let a = (Math.PI*2/6)*i - Math.PI/2;
        i===0 ? ctx.moveTo(Math.cos(a)*12*s, Math.sin(a)*12*s) : ctx.lineTo(Math.cos(a)*12*s, Math.sin(a)*12*s);
      }
      ctx.closePath();
    } else if (this.type === 'life') {
      // Circle
      ctx.beginPath();
      ctx.arc(0, 0, 12*s, 0, Math.PI*2);
    } else {
      // Star (weapon & bomb)
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        let a = (Math.PI*2/5)*i - Math.PI/2;
        ctx.lineTo(Math.cos(a)*13*s, Math.sin(a)*13*s);
        let a2 = a + Math.PI/5;
        ctx.lineTo(Math.cos(a2)*6*s, Math.sin(a2)*6*s);
      }
      ctx.closePath();
    }
    ctx.fillStyle = c.fill;
    ctx.fill();
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Icon
    ctx.rotate(-this.anim * 0.5);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.icon, 0, 1);
    ctx.restore();
  }
}

// ====== WINGMAN (子機) ======
class Wingman {
  constructor(side) {
    this.side = side; // -1=left, 1=right
    this.x = player.x + side * 60;
    this.y = player.y + 20;
    this.w = 28; this.h = 24;
    this.shootTimer = 0;
    this.anim = 0;
    this.bobPhase = side === -1 ? 0 : Math.PI;
  }
  update() {
    // Follow player with offset
    let tx = player.x + this.side * (55 + Math.sin(this.bobPhase) * 5);
    let ty = player.y + 25 + Math.cos(this.bobPhase * 0.7) * 4;
    this.x += (tx - this.x) * 0.12;
    this.y += (ty - this.y) * 0.12;
    this.anim += 0.15;
    this.bobPhase += 0.04;
    // Auto shoot
    this.shootTimer++;
    let fireRate = game.weaponLevel >= 5 ? 10 : 14;
    if (this.shootTimer >= fireRate) {
      this.shootTimer = 0;
      bullets.push(new Bullet(this.x, this.y - this.h/2, 0, -13));
      if (game.weaponLevel >= 5) {
        bullets.push(new Bullet(this.x + this.side * 4, this.y - this.h/2, this.side * 0.8, -12));
      }
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (game.invincible && Math.floor(frameCount / 4) % 2 === 0) ctx.globalAlpha = 0.4;
    // Engine flame
    let glow = 5 + Math.sin(this.anim * 2) * 3;
    ctx.beginPath();
    ctx.moveTo(-6, this.h/2 - 3);
    ctx.lineTo(-2, this.h/2 + 6 + glow);
    ctx.lineTo(2, this.h/2 + 6 + glow);
    ctx.lineTo(6, this.h/2 - 3);
    ctx.fillStyle = '#f80';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4, this.h/2 - 3);
    ctx.lineTo(-1, this.h/2 + 3 + glow * 0.5);
    ctx.lineTo(1, this.h/2 + 3 + glow * 0.5);
    ctx.lineTo(4, this.h/2 - 3);
    ctx.fillStyle = '#ff0';
    ctx.fill();
    // Body - sleek triangular ship
    ctx.beginPath();
    ctx.moveTo(0, -this.h/2);         // nose
    ctx.lineTo(-this.w/2, this.h/2 - 4);  // left wing
    ctx.lineTo(-4, this.h/2);         // left body
    ctx.lineTo(4, this.h/2);          // right body
    ctx.lineTo(this.w/2, this.h/2 - 4);   // right wing
    ctx.closePath();
    ctx.fillStyle = '#78c8e8';
    ctx.fill();
    ctx.strokeStyle = '#aee';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Cockpit
    ctx.fillStyle = '#0af';
    ctx.globalAlpha = 0.7 + Math.sin(this.anim) * 0.2;
    ctx.beginPath();
    ctx.arc(0, 2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Wing detail lines
    ctx.strokeStyle = 'rgba(150,220,255,0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-3, -4); ctx.lineTo(-this.w/2 + 3, this.h/2 - 6);
    ctx.moveTo(3, -4); ctx.lineTo(this.w/2 - 3, this.h/2 - 6);
    ctx.stroke();
    ctx.restore();
    // Engine trail particle
    if (Math.random() < 0.15) {
      particles.length < 150 && particles.push({
        x: this.x + (Math.random()-0.5)*6,
        y: this.y + this.h/2 + 3,
        vx: (Math.random()-0.5)*0.8, vy: Math.random()*2+1,
        life: 8+Math.random()*5, maxLife: 13,
        size: Math.random()*2+0.5,
        color: Math.random()>0.5 ? '#f80' : '#ff0', type: 'circle'
      });
    }
  }
}

function updateWingmen() {
  let needed = game.weaponLevel >= 3 ? 2 : 0;
  // Add wingmen if needed
  while (wingmen.length < needed) {
    let side = wingmen.length === 0 ? -1 : 1;
    wingmen.push(new Wingman(side));
    if (wingmen.length === 1) { SFX.wingman(); notify('🛩️ 子機加入編隊！', '#8df'); }
    if (wingmen.length === 2) { SFX.wingman(); notify('🛩️ 雙子機編隊完成！', '#8df'); }
  }
  // Remove if weapon downgraded (shouldn't happen but safety)
  while (wingmen.length > needed) wingmen.pop();
  wingmen.forEach(w => w.update());
}

// ====== NOTIFICATIONS ======
function notify(text, color) {
  game.notifications.push({ text, color: color||'#fa0', life: 120, y: canvas.height/2 - 50 });
}

// ====== COLLISION ======
function rectCollide(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w)/2 && Math.abs(a.y - b.y) < (a.h + b.h)/2;
}

// ====== SPAWN ENEMIES ======
let spawnTimer = 0;
let powerupTimer = 0;
function spawnEnemy() {
  spawnTimer++;
  let interval;
  if (game.bossActive) {
    // During boss: enemies spawn at slower rate, ramps up over time
    interval = Math.max(25, 60 - game.stage * 2);
    if (spawnTimer >= interval) {
      spawnTimer = 0;
      // Only bee and queen during boss (no medium)
      let type = Math.random() < 0.7 ? 'bee' : 'queen';
      enemies.push(new Enemy(type));
      // Spawn in small waves occasionally
      if (Math.random() < 0.3) {
        enemies.push(new Enemy('bee'));
      }
    }
  } else {
    interval = Math.max(18, 50 - game.stage * 3);
    if (spawnTimer >= interval) {
      spawnTimer = 0;
      let r = Math.random();
      let type;
      if (r < 0.6) type = 'bee';
      else if (r < 0.85) type = 'queen';
      else type = 'medium';
      enemies.push(new Enemy(type));
    }
  }
  // Periodic powerup drop from sky
  powerupTimer++;
  if (powerupTimer >= 180) { // every 3 sec
    powerupTimer = 0;
    let px = 40 + Math.random() * (canvas.width - 80);
    powerups.push(new Powerup(px, -20));
  }
}

// ====== USE SHIELD ======
function useShield() {
  if (game.shields > 0 && !game.shieldActive) {
    game.shields--;
    SFX.shield();
    game.shieldActive = true;
    game.shieldTimer = 300; // 5 sec
    notify('🛡️ 紫光護盾啟動！', '#c060ff');
    // Purple burst effect
    if (player) {
      for (let i = 0; i < 16; i++) {
        let a = (Math.PI*2/16) * i;
        particles.length < 150 && particles.push({
          x: player.x, y: player.y,
          vx: Math.cos(a)*6, vy: Math.sin(a)*6,
          life: 20+Math.random()*10, maxLife: 30,
          size: Math.random()*3+2, color: ['#c060ff','#a040ff','#e0a0ff','#8020cc'][Math.floor(Math.random()*4)], type: 'circle'
        });
      }
    }
  }
}

// ====== USE BOMB ======
function useBomb() {
  if (game.bombs > 0) {
    game.bombs--;
    SFX.bomb();
    game.screenFlash = 20;
    // Kill all enemies
    enemies.forEach(e => {
      spawnBigExplosion(e.x, e.y);
      game.score += 100;
      e.alive = false;
      game.enemiesKilled++;
    });
    // Damage boss
    if (game.boss && game.boss.alive) {
      game.boss.hp -= 50;
      spawnExplosion(game.boss.x, game.boss.y, game.boss.bossData.color, 30);
      if (game.boss.hp <= 0) {
        defeatBoss();
      }
    }
    // Clear enemy bullets
    enemyBullets.forEach(b => b.alive = false);
    notify('💥 超級炸彈！', '#f44');
  }
}

// ====== DEFEAT BOSS ======
function defeatBoss() {
  SFX.bossDie();
  let b = game.boss;
  // Multiple staggered explosions
  spawnBigExplosion(b.x, b.y);
  spawnBigExplosion(b.x-40, b.y-25);
  spawnBigExplosion(b.x+40, b.y+25);
  spawnBigExplosion(b.x-20, b.y+30);
  spawnBigExplosion(b.x+20, b.y-30);
  game.screenShake = 20;
  game.screenFlash = 15;
  game.score += 1000 + game.stage * 200;
  b.alive = false;
  game.bossActive = false;
  game.boss = null;
  bossLasers = [];
  enemyBullets = [];
  // Drop powerups (guaranteed weapon + laser + 2 random)
  powerups.push(new Powerup(b.x - 20, b.y, 'weapon'));
  powerups.push(new Powerup(b.x + 20, b.y, 'laser'));
  powerups.push(new Powerup(b.x - 40, b.y + 15));
  powerups.push(new Powerup(b.x + 40, b.y + 15));
  // Next stage
  game.stage++;
  game.cycle = Math.floor((game.stage - 1) / 6);
  game.enemiesKilled = 0;
  game.enemiesNeeded = 35 + game.stage * 8;
  game.shields = 5;
  SFX.stageStart();
  notify(`🎉 第 ${game.stage} 關！🛡️×5`, '#0f0');
}

// ====== PLAYER HIT ======
function playerHit() {
  if (game.invincible || game.shieldActive) return;
  SFX.playerHit();
  game.energy -= 15;
  game.screenFlash = 10;
  game.screenShake = 5;
  if (game.energy <= 0) {
    game.lives--;
    if (game.lives <= 0) {
      gameOver();
      return;
    }
    game.energy = 100;
    game.invincible = true;
    game.invincibleTimer = 180; // 3 sec
    notify('⚠️ 戰鬥機損壞！重生中...', '#f80');
  }
}

// ====== GAME OVER ======
function gameOver() {
  game.running = false;
  SFX.gameOver();
  stopBGM();
  document.getElementById('final-score').textContent = `最終分數: ${game.score}`;
  document.getElementById('gameover-screen').style.display = 'flex';
}

// ====== UPDATE ======
function update() {
  frameCount++;
  if (!game.running) return;

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    s.twinkle += 0.05;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; }
  });

  // Player
  player.update();
  updateWingmen();

  // Shield timer
  if (game.shieldActive) {
    game.shieldTimer--;
    if (game.shieldTimer <= 0) game.shieldActive = false;
  }
  // Invincible timer
  if (game.invincible) {
    game.invincibleTimer--;
    if (game.invincibleTimer <= 0) game.invincible = false;
  }

  // Bullets
  bullets.forEach(b => b.update());
  bullets = bullets.filter(b => b.alive);
  lasers.forEach(l => l.update());
  lasers = lasers.filter(l => l.alive);

  // Spawn
  spawnEnemy();

  // Check boss trigger
  if (!game.bossActive && game.enemiesKilled >= game.enemiesNeeded) {
    game.bossActive = true;
    game.boss = new Boss(game.stage - 1);
    let bossIdx = (game.stage - 1) % 6;
    game.bossAnnounce = 150;
    game.bossAnnounceName = BOSSES[bossIdx].name + ' ' + BOSSES[bossIdx].symbol;
    notify(`⚔️ ${BOSSES[bossIdx].name} 魔王登場！`, BOSSES[bossIdx].color);
    SFX.bossAppear();
    // Spawn escort wave with boss
    let waveCount = 4 + Math.min(game.stage, 6) * 2;
    for (let i = 0; i < waveCount; i++) {
      let e = new Enemy(Math.random() < 0.6 ? 'bee' : 'queen');
      e.x = 30 + Math.random() * (canvas.width - 60);
      e.y = -20 - Math.random() * 120;
      enemies.push(e);
    }
  }

  // Enemies
  enemies.forEach(e => e.update());
  enemies = enemies.filter(e => e.alive);

  // Boss
  if (game.boss && game.boss.alive) {
    game.boss.update();
  }

  // Enemy bullets
  enemyBullets.forEach(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > canvas.width+20 || b.y < -20 || b.y > canvas.height+20) b.alive = false;
  });
  enemyBullets = enemyBullets.filter(b => b.alive);

  // Boss lasers
  bossLasers.forEach(bl => bl.update());
  bossLasers = bossLasers.filter(bl => bl.alive);
  // Boss laser vs player
  if (player && game.running) {
    bossLasers.forEach(bl => {
      if (bl.phase === 'fire' && bl.beamW > 5 && bl.dmgCooldown <= 0) {
        if (Math.abs(player.x - bl.x) < bl.beamW/2 + player.w/2 && player.y > bl.startY) {
          playerHit();
          bl.dmgCooldown = 20; // damage every 20 frames
          spawnExplosion(player.x, player.y, '#a040ff', 6);
        }
      }
    });
  }

  // Powerups
  powerups.forEach(p => p.update());
  powerups = powerups.filter(p => p.alive);

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  // Notifications
  game.notifications.forEach(n => { n.life--; n.y -= 0.5; });
  game.notifications = game.notifications.filter(n => n.life > 0);

  if (game.screenFlash > 0) game.screenFlash--;
  if (game.bossAnnounce > 0) game.bossAnnounce--;

  // ====== COLLISIONS ======
  // Player bullets vs enemies
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (b.alive && e.alive && rectCollide(b, e)) {
        b.alive = false;
        e.hp--;
        spawnExplosion(b.x, b.y, e.color, 3);
        if (e.hp <= 0) {
          e.alive = false;
          SFX.enemyDie();
          game.score += e.score;
          game.enemiesKilled++;
          spawnExplosion(e.x, e.y, e.color, 12);
          if (Math.random() < 0.40) powerups.push(new Powerup(e.x, e.y));
        }
      }
    });
    // vs boss
    if (b.alive && game.boss && game.boss.alive && !game.boss.entering) {
      if (Math.abs(b.x - game.boss.x) < game.boss.w/2 && Math.abs(b.y - game.boss.y) < game.boss.h/2) {
        b.alive = false;
        game.boss.hp -= 1;
        spawnExplosion(b.x, b.y, game.boss.bossData.color, 2);
        if (game.boss.hp <= 0) defeatBoss();
      }
    }
  });

  // Lasers vs enemies
  lasers.forEach(l => {
    enemies.forEach(e => {
      if (l.alive && e.alive && rectCollide(l, e)) {
        e.hp -= l.dmg;
        spawnExplosion(l.x, e.y, '#c060ff', 4);
        if (e.hp <= 0) {
          e.alive = false;
          SFX.enemyDie();
          game.score += e.score;
          game.enemiesKilled++;
          spawnExplosion(e.x, e.y, e.color, 15);
          if (Math.random() < 0.45) powerups.push(new Powerup(e.x, e.y));
        }
      }
    });
    // vs boss
    if (l.alive && game.boss && game.boss.alive && !game.boss.entering) {
      if (Math.abs(l.x - game.boss.x) < game.boss.w/2 && Math.abs(l.y - game.boss.y) < game.boss.h/2) {
        game.boss.hp -= l.dmg;
        spawnExplosion(l.x, game.boss.y, '#c060ff', 3);
        if (game.boss.hp <= 0) defeatBoss();
      }
    }
  });

  // Enemy bullets vs player
  enemyBullets.forEach(b => {
    if (b.alive && rectCollide(b, player)) {
      b.alive = false;
      playerHit();
      spawnExplosion(b.x, b.y, '#f44', 5);
    }
  });

  // Enemies vs player
  enemies.forEach(e => {
    if (e.alive && rectCollide(e, player)) {
      e.alive = false;
      playerHit();
      spawnExplosion(e.x, e.y, e.color, 10);
    }
  });

  // Powerups vs player
  powerups.forEach(p => {
    if (p.alive && rectCollide(p, player)) {
      p.alive = false;
      if (p.type === 'weapon') {
        if (game.weaponLevel < 5) {
          game.weaponLevel++;
          SFX.upgrade();
          notify(`⬆ 武器升級 Lv.${game.weaponLevel}！`, '#ff0');
        } else {
          game.score += 200;
          SFX.powerup();
          notify('✨ 武器滿級 +200分！', '#ff0');
        }
      } else if (p.type === 'laser') {
        if (game.laserLevel < 5) {
          game.laserLevel++;
          SFX.upgrade();
          let names = ['','微光','聚能','烈焰','超載','毀滅'];
          notify(`⚡ 雷射升級 Lv.${game.laserLevel}【${names[game.laserLevel]}】！`, '#c060ff');
          for (let i = 0; i < 10; i++) {
            let a = (Math.PI*2/10)*i;
            particles.length < 150 && particles.push({
              x: player.x, y: player.y,
              vx: Math.cos(a)*5, vy: Math.sin(a)*5,
              life: 15, maxLife: 15, size: 2, color: '#c060ff', type: 'spark'
            });
          }
        } else {
          game.score += 200;
          SFX.powerup();
          notify('✨ 雷射滿級 +200分！', '#c060ff');
        }
      } else if (p.type === 'shield') {
        game.shields = Math.min(game.shields + 2, 10);
        SFX.powerup();
        notify(`🛡 護盾 +2（共${game.shields}）`, '#c060ff');
      } else if (p.type === 'bomb') {
        game.bombs = Math.min(game.bombs + 1, 8);
        SFX.powerup();
        notify(`💣 炸彈 +1（共${game.bombs}）`, '#f80');
      } else if (p.type === 'life') {
        game.lives = Math.min(game.lives + 1, 6);
        SFX.upgrade();
        notify(`❤ 生命 +1（共${game.lives}）`, '#f44');
      }
    }
  });
}

// ====== DRAW ======
let shootingStars = [];
function draw() {
  ctx.save();
  // Screen shake
  if (game.screenShake > 0) {
    let sx = (Math.random()-0.5) * game.screenShake * 1.5;
    let sy = (Math.random()-0.5) * game.screenShake * 1.5;
    ctx.translate(sx, sy);
    game.screenShake--;
  }
  // Background
  ctx.fillStyle = '#050520';
  ctx.fillRect(-10, -10, canvas.width+20, canvas.height+20);

  // Stars
  stars.forEach(s => {
    let alpha = 0.4 + Math.sin(s.twinkle) * 0.3;
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  // Shooting stars
  if (Math.random() < 0.003) {
    shootingStars.push({
      x: Math.random() * canvas.width, y: 0,
      vx: (Math.random()-0.5) * 3, vy: 8 + Math.random() * 6,
      life: 25 + Math.random() * 15
    });
  }
  shootingStars.forEach(s => {
    s.x += s.vx; s.y += s.vy; s.life--;
    ctx.strokeStyle = `rgba(180,220,255,${Math.min(1, s.life/15) * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx * 3, s.y - s.vy * 3);
    ctx.stroke();
  });
  shootingStars = shootingStars.filter(s => s.life > 0);

  // Particles
  particles.forEach(p => {
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'spark') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx*2, p.y - p.vy*2);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;

  // Powerups
  powerups.forEach(p => p.draw());

  // Bullets
  bullets.forEach(b => b.draw());
  lasers.forEach(l => l.draw());

  // Enemies
  enemies.forEach(e => e.draw());

  // Boss
  if (game.boss && game.boss.alive) game.boss.draw();

  // Boss lasers
  bossLasers.forEach(bl => bl.draw());

  // Enemy bullets - energy orbs
  enemyBullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.w, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.w/2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.w/5, 0, Math.PI*2);
    ctx.fill();
  });

  // Player
  if (player && game.running) {
    wingmen.forEach(w => w.draw());
    player.draw();
  }

  // Screen flash
  if (game.screenFlash > 0) {
    let intensity = game.screenFlash / 20;
    if (game.screenFlash > 12) {
      // White flash (boss defeat)
      ctx.fillStyle = `rgba(255,255,200,${intensity * 0.5})`;
    } else {
      ctx.fillStyle = `rgba(255,50,50,${intensity * 0.3})`;
    }
    ctx.fillRect(-10, -10, canvas.width+20, canvas.height+20);
  }

  // Boss announce
  if (game.bossAnnounce > 0) {
    let alpha = Math.min(1, game.bossAnnounce / 30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    

    ctx.fillText(`⚔ ${game.bossAnnounceName} ⚔`, canvas.width/2, canvas.height/2 - 20);
    ctx.font = '24px sans-serif';
    ctx.fillText('魔王登場！', canvas.width/2, canvas.height/2 + 30);
    ctx.restore();
  }

  // Notifications
  game.notifications.forEach(n => {
    let alpha = Math.min(1, n.life / 30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = n.color;
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    

    ctx.fillText(n.text, canvas.width/2, n.y);
    ctx.restore();
  });

  // ====== HUD ======
  drawHUD();

  // ====== MOUSE CROSSHAIR ======
  if (game.running) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,100,100,0.7)';
    ctx.lineWidth = 1.5;
    

    const cx = game.mouseX, cy = game.mouseY, s = 14;
    ctx.beginPath();
    ctx.moveTo(cx - s, cy); ctx.lineTo(cx - 4, cy);
    ctx.moveTo(cx + 4, cy); ctx.lineTo(cx + s, cy);
    ctx.moveTo(cx, cy - s); ctx.lineTo(cx, cy - 4);
    ctx.moveTo(cx, cy + 4); ctx.lineTo(cx, cy + s);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,200,100,0.8)';
    ctx.stroke();

    ctx.restore();
  }
  ctx.restore(); // screen shake
}

function drawHUD() {
  let px = 15, py = 15;
  // Panel bg
  ctx.fillStyle = 'rgba(0,10,30,0.7)';
  ctx.fillRect(5, 5, 260, 175);
  ctx.strokeStyle = 'rgba(0,200,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(5, 5, 260, 175);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';

  // Score
  ctx.fillStyle = '#ff0';
  ctx.fillText(`分數: ${game.score}`, px, py + 16);

  // Stage
  ctx.fillStyle = '#0f0';
  let bossIdx = (game.stage - 1) % 6;
  ctx.fillText(`第 ${game.stage} 關 - ${BOSSES[bossIdx].name}`, px, py + 38);

  // Lives
  ctx.fillStyle = '#f44';
  let livesText = '';
  for (let i = 0; i < game.lives; i++) livesText += '🚀 ';
  ctx.fillText(`生命: ${livesText}`, px, py + 60);

  // Energy bar
  ctx.fillStyle = '#aaa';
  ctx.fillText('能源:', px, py + 82);
  ctx.fillStyle = '#333';
  ctx.fillRect(px + 50, py + 70, 150, 14);
  let eColor = game.energy > 50 ? '#0f0' : game.energy > 25 ? '#ff0' : '#f00';
  ctx.fillStyle = eColor;
  ctx.fillRect(px + 50, py + 70, 150 * (game.energy/100), 14);
  ctx.strokeStyle = '#888';
  ctx.strokeRect(px + 50, py + 70, 150, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.fillText(`${game.energy}/100`, px + 100, py + 82);

  // Weapon level
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#0ff';
  ctx.fillText(`武器 Lv.${game.weaponLevel}`, px, py + 104);
  if (game.weaponLevel >= 4) {
    ctx.fillStyle = '#c060ff';
    ctx.fillText(`⚡Lv.${game.laserLevel}`, px + 68, py + 104);
  }

  // Items
  ctx.fillStyle = '#c060ff';
  ctx.fillText(`🛡️×${game.shields}`, px, py + 126);

  ctx.fillStyle = '#f84';
  ctx.fillText(`💥×${game.bombs}(W)`, px + 80, py + 126);

  // Progress
  if (!game.bossActive) {
    ctx.fillStyle = '#aaa';
    ctx.font = '13px sans-serif';
    ctx.fillText(`擊敗進度: ${game.enemiesKilled}/${game.enemiesNeeded}`, px, py + 148);
    ctx.fillStyle = '#333';
    ctx.fillRect(px + 110, py + 138, 100, 10);
    ctx.fillStyle = '#a0f';
    ctx.fillRect(px + 110, py + 138, 100 * Math.min(1, game.enemiesKilled/game.enemiesNeeded), 10);
  } else {
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText('⚔ 魔王戰進行中！', px, py + 148);
  }

  // Shield active indicator
  if (game.shieldActive) {
    let barW = 260 * (game.shieldTimer / 300);
    ctx.fillStyle = 'rgba(180,60,255,0.5)';
    ctx.fillRect(5, py + 150, barW, 8);
  }
}

// ====== GAME LOOP ======
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ====== INPUT ======
function getCanvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

// --- Mouse: direct position tracking (high frequency) ---
let lastMouseEvent = null;
document.addEventListener('mousemove', e => {
  const c = getCanvasCoords(e.clientX, e.clientY);
  game.mouseX = c.x;
  game.mouseY = c.y;
  game.targetX = c.x;
  game.targetY = c.y;
  game.inputActive = true;
  lastMouseEvent = e;
}, { passive: true });
// Use pointer events for even faster response
document.addEventListener('pointermove', e => {
  if (e.pointerType === 'mouse' || e.pointerType === 'pen') {
    const c = getCanvasCoords(e.clientX, e.clientY);
    game.mouseX = c.x;
    game.mouseY = c.y;
    game.targetX = c.x;
    game.targetY = c.y;
    game.inputActive = true;
  }
}, { passive: true });
canvas.addEventListener('click', e => {
  const c = getCanvasCoords(e.clientX, e.clientY);
  game.mouseX = c.x;
  game.mouseY = c.y;
  game.targetX = c.x;
  game.targetY = c.y;
});
document.addEventListener('mousedown', e => {
  if (e.button === 0 && game.running) useShield();
});

// --- Touch: relative offset mode for smooth mobile ---
let touchOffsetX = 0, touchOffsetY = 0;
let touchActive = false;
document.addEventListener('touchstart', e => {
  e.preventDefault();
  touchActive = true;
  const c = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
  game.mouseX = c.x;
  game.mouseY = c.y;
  if (player) {
    touchOffsetX = c.x - player.x;
    touchOffsetY = c.y - player.y;
  } else {
    touchOffsetX = 0;
    touchOffsetY = 0;
  }
  game.targetX = player ? player.x : c.x;
  game.targetY = player ? player.y : c.y;
  game.inputActive = true;
}, { passive: false });
document.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const t = e.touches[0];
  const c = getCanvasCoords(t.clientX, t.clientY);
  game.mouseX = c.x;
  game.mouseY = c.y;
  game.targetX = c.x - touchOffsetX;
  game.targetY = c.y - touchOffsetY;
  game.inputActive = true;
}, { passive: false });
document.addEventListener('touchend', e => {
  touchActive = false;
  if (player) {
    game.targetX = player.x;
    game.targetY = player.y;
  }
}, { passive: true });
// Touch shield: double tap
let lastTapTime = 0;
document.addEventListener('touchstart', e => {
  let now = Date.now();
  if (now - lastTapTime < 300 && game.running) {
    useShield();
  }
  lastTapTime = now;
}, { passive: true });

document.addEventListener('keydown', e => {
  game.keys[e.key] = true;
  if (e.key === 'q' || e.key === 'Q') useShield();
  if (e.key === 'w' || e.key === 'W') {
    if (!game.keys['ArrowUp'] && game.running) useBomb();
  }
});
document.addEventListener('keyup', e => { game.keys[e.key] = false; });

  initAudio();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  initGame();
}

function restartGame() {
  initAudio();
  document.getElementById('gameover-screen').style.display = 'none';
  initGame();
}

function initGame() {
  game.running = true;
  game.score = 0;
  game.lives = 3;
  game.energy = 100;
  game.weaponLevel = 1;
  game.laserLevel = 1;
  game.shields = 5;
  game.bombs = 3;
  game.shieldActive = false;
  game.shieldTimer = 0;
  game.invincible = true;
  game.invincibleTimer = 120;
  game.stage = 1;
  game.cycle = 0;
  game.enemiesKilled = 0;
  game.enemiesNeeded = 40;
  game.bossActive = false;
  game.boss = null;
  game.bossAnnounce = 0;
  game.screenFlash = 0;
  game.screenShake = 0;
  game.notifications = [];
  game.keys = {};

  player = new Player();
  game.mouseX = player.x;
  game.mouseY = player.y;
  game.targetX = player.x;
  game.targetY = player.y;
  game.inputActive = false;
  bullets = [];
  lasers = [];
  enemies = [];
  enemyBullets = [];
  bossLasers = [];
  particles = [];
  powerups = [];
  wingmen = [];
  spawnTimer = 0;
  powerupTimer = 0;

  initStars();
  SFX.stageStart();
  startBGM();
  notify('🚀 出發！消滅蜜蜂軍團！', '#fa0');
}

let splashDismissed = false;
function dismissSplash() {
  if (splashDismissed) return;
  splashDismissed = true;
  initAudio();
  let splash = document.getElementById('splash-screen');
  splash.style.transition = 'opacity 0.6s';
  splash.style.opacity = '0';
  setTimeout(() => {
    splash.style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
  }, 600);
}
document.getElementById('splash-screen').addEventListener('click', dismissSplash);
document.getElementById('splash-screen').addEventListener('touchstart', dismissSplash);
document.addEventListener('keydown', function splashKey(e) {
  if (!splashDismissed) {
    dismissSplash();
    e.preventDefault();
  }
}, { once: false });

</script>
