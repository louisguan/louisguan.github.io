<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙人超級瑪利歐 - 82關終極大挑戰</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: "Courier New", Courier, monospace;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            border: 4px solid #fff;
            border-radius: 4px;
        }
        canvas {
            display: block;
            background-color: #5C94FC;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        .stats {
            text-align: center;
            font-size: 24px;
            color: #F8D820;
        }
        #level-indicator {
            font-size: 16px;
            color: #FFF;
            margin-bottom: 5px;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 4px 4px 0 #000;
            display: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 50px;
            border-radius: 10px;
            border: 4px solid #fff;
            z-index: 100;
        }
        /* 創作家編輯器 UI */
        #editor-toolbar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #fff;
            display: none;
            gap: 10px;
            z-index: 50;
        }
        .tool-btn {
            background: #444; color: white; border: 2px solid #888;
            padding: 5px 10px; cursor: pointer; border-radius: 5px;
            font-weight: bold; font-family: inherit;
        }
        .tool-btn.active { border-color: #F8D820; background: #666; }
        .tool-btn:hover { background: #555; }
        
        #sys-toolbar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 50;
        }
        .sys-btn {
            background: #F83800; color: white; border: 2px solid #FFF;
            padding: 5px 15px; cursor: pointer; border-radius: 20px;
            font-weight: bold; font-family: inherit; box-shadow: 2px 2px 0 #000;
        }
        .sys-btn:hover { background: #C84C0C; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="sys-toolbar">
        <button class="sys-btn" onclick="toggleMode()" id="modeBtn">切換編輯模式 🛠️</button>
        <button class="sys-btn" onclick="exportLevel()" id="exportBtn" style="display:none; background:#00A800;">匯出分享 📤</button>
        <button class="sys-btn" onclick="importLevel()" id="importBtn" style="display:none; background:#0048A8;">匯入關卡 📥</button>
    </div>

    <div id="ui-layer">
        <div>玩家 1<br>(WASD, S入水管)</div>
        <div class="stats" id="game-stats">
            <div id="level-indicator">LEVEL: <span id="levelVal">1</span> / 82</div>
            SCORE: <span id="scoreVal">00000</span><br>COINS: <span id="coinVal">0</span>
        </div>
        <div style="text-align: right;">玩家 2<br>(方向鍵, ↓入水管)</div>
    </div>
    
    <div id="editor-toolbar">
        <button class="tool-btn active" onclick="setTool('G')">🟫 地板</button>
        <button class="tool-btn" onclick="setTool('B')">🧱 磚塊</button>
        <button class="tool-btn" onclick="setTool('?')">❓ 問號</button>
        <button class="tool-btn" onclick="setTool('P')">🟩 水管</button>
        <button class="tool-btn" onclick="setTool('C')">🟡 金幣</button>
        <button class="tool-btn" onclick="setTool('E')">😡 敵人</button>
        <button class="tool-btn" onclick="setTool('M')">🍄 蘑菇(變異)</button>
        <button class="tool-btn" onclick="setTool('W')">🌸 驚奇花</button>
        <button class="tool-btn" onclick="setTool(' ')">🧽 橡皮擦</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('message');
    const scoreEl = document.getElementById('scoreVal');
    const coinEl = document.getElementById('coinVal');
    const levelEl = document.getElementById('levelVal');
    const editorToolbar = document.getElementById('editor-toolbar');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const gameStats = document.getElementById('game-stats');
    const modeBtn = document.getElementById('modeBtn');

    // 系統狀態
    const MAX_LEVELS = 82;
    let currentLevel = 1;
    let gameState = 'PLAYING'; // PLAYING, EDIT, WON
    let currentTool = 'G';
    let globalScore = 0;
    let globalCoins = 0;
    let wonderMode = false;
    let wonderTimer = 0;

    // 物理常數
    const GRAVITY = 0.6;
    const FRICTION = 0.8;
    const TILE_SIZE = 40;
    const MAX_SPEED = 6;
    const JUMP_FORCE = -15;
    
    const keys = {};

    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight", "KeyS", "KeyW"].indexOf(e.code) > -1) {
            e.preventDefault();
        }
    });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    // 載入角色圖片
    const imgPlayer1 = new Image();
    imgPlayer1.src = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTDRRafJWJSC3Be0M8lLDTxKcJ5y4fgX-c75w&s';
    const imgPlayer2 = new Image();
    imgPlayer2.src = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHK7SRVvmbkrvysCZG9KmyShu3QddXcP0WXw&s';

    // ----------------------------------------------------
    // 關卡生成引擎 (Procedural Generation)
    // ----------------------------------------------------
    const allLevelsData = [];

    // 第一關：手刻展示關卡 (保留隱藏路線與經典設計)
    const level1Map = [
        "                                                                                                                                                      ",
        "                                                                                                                                                      ",
        "                                                                                                                                                      ",
        "                                          C C C                                                                                                       ",
        "                                                                                                                                                      ",
        "                                                                W                                                                                     ",
        "                                                                                                                                                      ",
        "                                      M                                                                                                               ",
        "                                                                                                                                             F        ",
        "                                 B?B?B                                         ?                                     BMB                     F        ",
        "                 ?                                                ?          C C C C                                                         F        ",
        "                                                                                                   B                                         F        ",
        "            B?BM?          E                     T               P           E       E             BB         X                              F        ",
        "                                                 P                 BB?BB                   P     BBB               B                         F        ",
        "GGGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG",
        "GGGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG",
        // 地底隱藏關卡
        "                                                                                                                                                      ",
        "                                                                                                                                                      ",
        "                                                                                                                                                      ",
        "                                                 BBBBBBBBBBBBBBBBBBB                                                                                  ",
        "                                                 B                 B                                                                                  ",
        "                                                 B  C C C C C C C  B                                                                                  ",
        "                                                 B  C C C C C C C  B                                                                                  ",
        "                                                 B                 B                                                                                  ",
        "                                                 B        U        B                                                                                  ",
        "                                                 B        P        B                                                                                  ",
        "                                                 BBBBBBBBBBBBBBBBBBB                                                                                  ",
        "                                                 GGGGGGGGGGGGGGGGGGG                                                                                  ",
        "                                                 GGGGGGGGGGGGGGGGGGG                                                                                  "
    ];

    // 生成第 2 到 82 關的程序化關卡
    function generateProceduralMap(levelNum) {
        // 使用關卡編號作為偽隨機數種子，確保每次遊玩的同一關都長得一樣
        let seed = levelNum * 12345;
        function rnd() {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }

        // 隨著關卡推進，地圖會越來越長
        const width = 120 + Math.floor(levelNum * 2);
        const map = Array.from({length: 16}, () => Array(width).fill(' '));

        // 建立地板
        for(let x = 0; x < width; x++) {
            map[14][x] = 'G'; map[15][x] = 'G';
        }

        // 挖出深淵 (隨著難度提高)
        let gapChance = Math.min(0.25, 0.05 + levelNum * 0.003);
        let x = 15;
        while(x < width - 20) {
            if (rnd() < gapChance) {
                let gapWidth = 2 + Math.floor(rnd() * 3); // 2~4格寬的深淵
                for(let i=0; i<gapWidth; i++) { map[14][x+i] = ' '; map[15][x+i] = ' '; }
                x += gapWidth + 3; // 確保深淵之間有足夠的安全空間
            } else { x += 1; }
        }

        // 放置障礙物、敵人與道具
        x = 15;
        let hasWonder = false;
        while(x < width - 20) {
            if (map[14][x] === ' ') { x++; continue; } // 跳過深淵上方
            let r = rnd();

            if (r < 0.15) {
                // 水管
                let pipeH = 1 + Math.floor(rnd() * 3);
                for(let p=0; p<pipeH; p++) map[13-p][x] = 'P';
                x += 3;
            } else if (r < 0.35) {
                // 磚塊區與問號
                let bWidth = 3 + Math.floor(rnd() * 3);
                let bHeight = rnd() > 0.5 ? 9 : 5; // 懸空高度
                for(let i=0; i<bWidth; i++) {
                    if (rnd() < 0.2) map[bHeight][x+i] = '?';
                    else if (rnd() < 0.1) map[bHeight][x+i] = 'M';
                    else map[bHeight][x+i] = 'B';
                }
                x += bWidth + 2;
            } else if (r < 0.55) {
                // 敵人
                if (rnd() < 0.2 && levelNum > 5) map[13][x] = 'X'; // 巨大變異敵人
                else map[13][x] = 'E'; // 栗寶寶
                x += 2;
            } else if (r < 0.60 && !hasWonder) {
                // 每關一朵驚奇花
                map[8][x] = 'W';
                hasWonder = true;
                x += 2;
            } else if (r < 0.70) {
                // 金幣排列
                map[11][x] = 'C';
                if (rnd() > 0.5) map[11][x+1] = 'C';
                x += 2;
            } else {
                x++;
            }
        }

        // 開局保障：一定給一個蘑菇
        map[9][8] = '?'; map[9][9] = 'M'; map[9][10] = '?';

        // 終點區確保安全與放置旗桿
        for(let i = width-15; i < width; i++) { map[14][i] = 'G'; map[15][i] = 'G'; }
        for(let r = 0; r < 14; r++) { map[r][width-6] = ' '; map[r][width-7] = ' '; } // 清空旗桿周圍
        map[8][width - 6] = 'F';

        return map.map(row => row.join(''));
    }

    // 預先載入所有 82 關的地圖資料
    function generateAllLevels() {
        allLevelsData.push(level1Map);
        for(let i = 2; i <= MAX_LEVELS; i++) {
            allLevelsData.push(generateProceduralMap(i));
        }
    }

    // ----------------------------------------------------
    // 遊戲物理與邏輯
    // ----------------------------------------------------
    let mapGrid = [];
    let blocks = [];
    let collectibles = []; 
    let items = []; 
    let enemies = [];
    let flagPole = null;

    let warpT = {x: 0, y: 0};
    let warpU = {x: 0, y: 0};

    let cameraX = 0;
    let cameraY = 0; 
    let SCENE_WIDTH = 0;

    // 載入指定關卡
    function loadLevel(levelNum) {
        currentLevel = levelNum;
        levelEl.innerText = currentLevel;
        
        // 讀取該關卡字串陣列，轉為可編輯的網格
        mapGrid = allLevelsData[currentLevel - 1].map(row => row.split(''));
        SCENE_WIDTH = mapGrid[0].length * TILE_SIZE;
        
        buildLevelFromGrid();
        gameState = 'PLAYING';
        msgEl.style.display = 'none';
    }

    // 將網格轉換成遊戲實體物件 (每次切換回遊玩模式或重生時執行)
    function buildLevelFromGrid() {
        blocks = []; collectibles = []; items = []; enemies = []; flagPole = null;
        warpT = {x: 0, y: 0}; warpU = {x: 0, y: 0};
        wonderMode = false; wonderTimer = 0;
        
        for (let y = 0; y < mapGrid.length; y++) {
            for (let x = 0; x < mapGrid[y].length; x++) {
                const char = mapGrid[y][x];
                if (char === ' ') continue;

                if (char === 'F') {
                    if (!flagPole) flagPole = { x: x * TILE_SIZE, y: y * TILE_SIZE, w: 10, h: TILE_SIZE * 6 };
                } else if (char === 'C') {
                    collectibles.push({ x: x * TILE_SIZE + 10, y: y * TILE_SIZE + 10, w: 20, h: 20, collected: false });
                } else if (char === 'E') { 
                    enemies.push({ x: x * TILE_SIZE, y: y * TILE_SIZE + 4, w: 32, h: 36, type: 'E', vx: -1.5, vy: 0, active: true, hp: 1 });
                } else if (char === 'X') { 
                    enemies.push({ x: x * TILE_SIZE, y: y * TILE_SIZE - 32, w: 64, h: 72, type: 'X', vx: -1.0, vy: 0, active: true, hp: 2 });
                } else if (char === 'W') {
                    items.push({ x: x * TILE_SIZE, y: y * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, type: 'W', active: true, vx: 0, vy: 0 });
                } else {
                    let isWarp = false;
                    if (char === 'T') { warpT = {x: x*TILE_SIZE, y: y*TILE_SIZE}; isWarp = 'T'; }
                    if (char === 'U') { warpU = {x: x*TILE_SIZE, y: y*TILE_SIZE}; isWarp = 'U'; }
                    blocks.push({ x: x * TILE_SIZE, y: y * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE, type: char, active: true, isWarp: isWarp });
                }
            }
        }

        // 重置玩家與攝影機
        player1.x = 100; player1.y = 100; player1.vx = 0; player1.vy = 0; player1.isBig = false; player1.h = 32; player1.invulnerableTimer = 0;
        player2.x = 150; player2.y = 100; player2.vx = 0; player2.vy = 0; player2.isBig = false; player2.h = 32; player2.invulnerableTimer = 0;
        cameraX = 0; cameraY = 0;
    }

    // --- 創作家編輯器邏輯 ---
    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function toggleMode() {
        if (gameState === 'PLAYING' || gameState === 'WON') {
            gameState = 'EDIT';
            modeBtn.innerText = '開始試玩 ▶️';
            modeBtn.style.background = '#00A800';
            editorToolbar.style.display = 'flex';
            exportBtn.style.display = 'block';
            importBtn.style.display = 'block';
            gameStats.style.display = 'none';
            msgEl.style.display = 'none';
            player1.vy = 0; player2.vy = 0;
        } else {
            gameState = 'PLAYING';
            modeBtn.innerText = '切換編輯模式 🛠️';
            modeBtn.style.background = '#F83800';
            editorToolbar.style.display = 'none';
            exportBtn.style.display = 'none';
            importBtn.style.display = 'none';
            gameStats.style.display = 'block';
            buildLevelFromGrid(); // 套用編輯結果
        }
    }

    let isDrawing = false;
    canvas.addEventListener('mousedown', (e) => { if (gameState === 'EDIT') { isDrawing = true; paint(e); } });
    canvas.addEventListener('mousemove', (e) => { if (gameState === 'EDIT' && isDrawing) paint(e); });
    window.addEventListener('mouseup', () => { isDrawing = false; });

    function paint(e) {
        let rect = canvas.getBoundingClientRect();
        let gridX = Math.floor(((e.clientX - rect.left) + cameraX) / TILE_SIZE);
        let gridY = Math.floor(((e.clientY - rect.top) + cameraY) / TILE_SIZE);

        if (gridY >= 0 && gridY < mapGrid.length && gridX >= 0 && gridX < mapGrid[0].length) {
            if (currentTool === 'M' && mapGrid[gridY][gridX] === 'E') mapGrid[gridY][gridX] = 'X'; 
            else if (currentTool !== 'M' || mapGrid[gridY][gridX] !== 'X') mapGrid[gridY][gridX] = currentTool;
        }
    }

    function exportLevel() {
        let encoded = btoa(mapGrid.map(row => row.join('')).join('\n'));
        navigator.clipboard.writeText(encoded).then(() => alert('關卡代碼已複製到剪貼簿！')).catch(() => alert('代碼：\n' + encoded));
    }

    function importLevel() {
        let code = prompt("請貼上關卡代碼：");
        if (code) {
            try {
                let newMap = atob(code).split('\n').map(row => row.split(''));
                if (newMap.length > 0 && newMap[0].length > 0) {
                    mapGrid = newMap; SCENE_WIDTH = mapGrid[0].length * TILE_SIZE;
                    alert('匯入成功！點擊「開始試玩」來挑戰吧！');
                }
            } catch (e) { alert('代碼格式錯誤！'); }
        }
    }

    // --- 玩家類別與互動 ---
    function addScore(points) { globalScore += points; scoreEl.innerText = String(globalScore).padStart(5, '0'); }
    function addCoin() { globalCoins += 1; coinEl.innerText = globalCoins; addScore(100); }

    class Player {
        constructor(x, y, img, controls) {
            this.x = x; this.y = y; this.w = 32; this.h = 32;
            this.vx = 0; this.vy = 0; this.speed = 1.0;
            this.img = img; this.controls = controls;
            this.grounded = false; this.facingRight = true;
            this.isBig = false; this.invulnerableTimer = 0;
        }

        grow() {
            if (!this.isBig) { this.isBig = true; this.y -= 32; this.h = 64; addScore(1000); }
        }

        takeDamage() {
            if (this.invulnerableTimer > 0) return;
            if (this.isBig) {
                this.isBig = false; this.h = 32; this.invulnerableTimer = 90; this.vy = -6;
            } else { this.die(); }
        }

        update() {
            if (gameState !== 'PLAYING') return;
            if (this.invulnerableTimer > 0) this.invulnerableTimer--;

            if (keys[this.controls.left]) { this.vx -= this.speed; this.facingRight = false; }
            if (keys[this.controls.right]) { this.vx += this.speed; this.facingRight = true; }
            if (keys[this.controls.jump] && this.grounded) { this.vy = JUMP_FORCE; this.grounded = false; }

            // 水管傳送
            if (keys[this.controls.down] && this.grounded) {
                for (let b of blocks) {
                    if (b.isWarp && b.active && Math.abs((this.x+this.w/2) - (b.x+b.w/2)) < 15 && Math.abs(this.y+this.h - b.y) < 5) {
                        let dest = b.isWarp === 'T' ? warpU : warpT;
                        if (dest.x !== 0) {
                            player1.x = dest.x; player1.y = dest.y - 64; player1.vy = 0;
                            player2.x = dest.x; player2.y = dest.y - 64; player2.vy = 0;
                        }
                    }
                }
            }

            this.vx *= FRICTION;
            if (this.vx > MAX_SPEED) this.vx = MAX_SPEED;
            if (this.vx < -MAX_SPEED) this.vx = -MAX_SPEED;

            this.x += this.vx;
            if (this.x < cameraX) { this.x = cameraX; this.vx = 0; }
            this.checkCollisions('x');

            this.vy += GRAVITY;
            this.y += this.vy;
            this.grounded = false;
            this.checkCollisions('y');

            this.checkCollectibles();
            this.checkItems();

            if (flagPole && this.x + this.w > flagPole.x && this.x < flagPole.x + flagPole.w && 
                this.y + this.h > flagPole.y && this.y < flagPole.y + flagPole.h) {
                winLevel();
            }
        }

        checkCollisions(axis) {
            for (let b of blocks) {
                if (!b.active) continue; 
                if (this.x < b.x + b.w && this.x + this.w > b.x && this.y < b.y + b.h && this.y + this.h > b.y) {
                    if (axis === 'x') {
                        if (this.vx > 0) this.x = b.x - this.w; else if (this.vx < 0) this.x = b.x + b.w;
                        this.vx = 0;
                    } else if (axis === 'y') {
                        if (this.vy > 0) { this.y = b.y - this.h; this.grounded = true; } 
                        else if (this.vy < 0) { this.y = b.y + b.h; this.hitBlock(b); }
                        this.vy = 0;
                    }
                }
            }
        }

        hitBlock(b) {
            if (b.type === '?' || b.type === 'M') {
                if (b.type === '?') addCoin(); 
                else if (b.type === 'M') { items.push({ x: b.x + 4, y: b.y - TILE_SIZE, w: 32, h: 32, type: 'M', vx: 2, vy: -5, active: true }); }
                b.type = 'E'; 
            } else if (b.type === 'B') {
                if (this.isBig) { b.active = false; addScore(50); } 
            }
        }

        checkCollectibles() {
            for (let c of collectibles) {
                if (!c.collected && this.x < c.x + c.w && this.x + this.w > c.x && this.y < c.y + c.h && this.y + this.h > c.y) {
                    c.collected = true; addCoin();
                }
            }
        }

        checkItems() {
            for (let i = 0; i < items.length; i++) {
                let m = items[i];
                if (m.active && this.x < m.x + m.w && this.x + this.w > m.x && this.y < m.y + m.h && this.y + this.h > m.y) {
                    m.active = false;
                    if (m.type === 'M') this.grow();
                    else if (m.type === 'W') activateWonderMode();
                }
            }
        }

        die() {
            this.vy = 0; this.y = cameraY - 50; this.isBig = false; this.h = 32; this.invulnerableTimer = 90;
            let otherPlayer = this === player1 ? player2 : player1;
            this.x = otherPlayer.x; 
        }

        draw() {
            if (this.invulnerableTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
            ctx.save();
            if (this.img.complete && this.img.naturalWidth > 0) {
                if (!this.facingRight) { ctx.translate(this.x + this.w, this.y); ctx.scale(-1, 1); ctx.drawImage(this.img, 0, 0, this.w, this.h); } 
                else { ctx.drawImage(this.img, this.x, this.y, this.w, this.h); }
            } else {
                ctx.fillStyle = this === player1 ? 'red' : 'green'; ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            ctx.restore();
        }
    }

    const player1 = new Player(100, 100, imgPlayer1, { left: 'KeyA', right: 'KeyD', jump: 'KeyW', down: 'KeyS' });
    const player2 = new Player(150, 100, imgPlayer2, { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', down: 'ArrowDown' });

    function winLevel() {
        if (gameState === 'WON') return;
        gameState = 'WON'; 
        addScore(5000);
        
        if (currentLevel < MAX_LEVELS) {
            msgEl.innerHTML = `第 ${currentLevel} 關 通關！<br><span style="font-size:24px; color:#F8D820">3 秒後進入下一關...</span>`;
            setTimeout(() => {
                loadLevel(currentLevel + 1);
            }, 3000);
        } else {
            msgEl.innerHTML = `🏆 傳奇誕生 🏆<br>恭喜通關全部 82 個關卡！<br><span style="font-size:30px; color:#F8D820">終極總分: ${globalScore}</span>`;
        }
        msgEl.style.display = 'block';
    }

    function activateWonderMode() {
        wonderMode = true; wonderTimer = 600; addScore(3000);
        for(let i=0; i<30; i++) {
            collectibles.push({ x: cameraX + canvas.width/2 + (Math.random()-0.5)*600, y: cameraY + 50 + Math.random()*200, 
                w: 20, h: 20, collected: false, vx: (Math.random()-0.5)*6, vy: -Math.random()*8 - 5, isWonder: true });
        }
    }

    function updateCamera() {
        if (gameState === 'EDIT') {
            if (keys['KeyA'] || keys['ArrowLeft']) cameraX -= 15;
            if (keys['KeyD'] || keys['ArrowRight']) cameraX += 15;
            if (cameraX < 0) cameraX = 0;
            if (cameraX > SCENE_WIDTH - canvas.width) cameraX = SCENE_WIDTH - canvas.width;
            return;
        }

        if (gameState !== 'PLAYING') return;
        let maxPlayerX = Math.max(player1.x, player2.x);
        let targetCameraX = maxPlayerX - canvas.width * 0.4;
        
        if (targetCameraX > cameraX) cameraX = targetCameraX;
        if (cameraX > SCENE_WIDTH - canvas.width) cameraX = SCENE_WIDTH - canvas.width;
        if (cameraX < 0) cameraX = 0;
        
        if (player1.y > 600 && player2.y > 600) cameraY = 16 * TILE_SIZE; 
        else if (player1.y < 600 && player2.y < 600) cameraY = 0;
        
        if (player1.x < cameraX) { player1.x = cameraX; player1.vx = 0; }
        if (player2.x < cameraX) { player2.x = cameraX; player2.vx = 0; }
    }

    function updateGameLogic() {
        if (gameState !== 'PLAYING') return;
        
        // 死亡判定 (雙人同時掉入深淵 -> 重新開始本關)
        let deathY = cameraY === 0 ? 600 : 1250;
        if (player1.y > deathY + 50 && player2.y > deathY + 50) {
            // 兩人皆亡，重新載入本關
            loadLevel(currentLevel);
            return;
        } else if (player1.y > deathY + 50) { player1.die(); }
          else if (player2.y > deathY + 50) { player2.die(); }

        // 敵人邏輯
        for (let e of enemies) {
            if (!e.active) continue;
            if (e.x > cameraX + canvas.width + 100 || e.x < cameraX - 100) continue;

            e.vy += GRAVITY; e.x += e.vx;
            for(let b of blocks) {
                if(!b.active) continue;
                if(e.x < b.x+b.w && e.x+e.w > b.x && e.y < b.y+b.h && e.y+e.h > b.y) {
                    e.vx *= -1; if(e.vx > 0) e.x = b.x+b.w; else e.x = b.x-e.w;
                }
            }
            e.y += e.vy;
            for(let b of blocks) {
                if(!b.active) continue;
                if(e.x < b.x+b.w && e.x+e.w > b.x && e.y < b.y+b.h && e.y+e.h > b.y) {
                    if(e.vy > 0) { e.y = b.y-e.h; e.vy = 0; }
                }
            }

            [player1, player2].forEach(p => {
                if(p.x < e.x+e.w && p.x+p.w > e.x && p.y < e.y+e.h && p.y+p.h > e.y) {
                    if(p.vy > 0 && p.y + p.h < e.y + e.h / 2 + 15) {
                        p.vy = -12; e.hp--;
                        if(e.hp <= 0) { e.active = false; addScore(e.type==='X'? 800:200); }
                        else { e.h = 36; e.y += 36; e.type='E'; }
                    } else { p.takeDamage(); }
                }
            });
            if (e.y > 2000) e.active = false;
        }

        // 驚奇與道具邏輯
        if (wonderMode) {
            wonderTimer--;
            if (wonderTimer <= 0) { wonderMode = false; collectibles = collectibles.filter(c => !c.isWonder || c.collected); }
        }

        for (let m of items) {
            if (!m.active || m.type !== 'M') continue;
            m.vy += GRAVITY; m.x += m.vx;
            for(let b of blocks) {
                if(!b.active) continue;
                if(m.x < b.x+b.w && m.x+m.w > b.x && m.y < b.y+b.h && m.y+m.h > b.y) {
                    m.vx *= -1; if(m.vx > 0) m.x = b.x+b.w; else m.x = b.x-m.w;
                }
            }
            m.y += m.vy;
            for(let b of blocks) {
                if(!b.active) continue;
                if(m.x < b.x+b.w && m.x+m.w > b.x && m.y < b.y+b.h && m.y+m.h > b.y) {
                    if(m.vy > 0) { m.y = b.y-m.h; m.vy = 0; }
                }
            }
        }

        for (let c of collectibles) {
            if (!c.collected && c.isWonder) {
                c.vy += GRAVITY; c.x += c.vx; c.y += c.vy;
                if (c.y > cameraY + canvas.height - 40) { c.y = cameraY + canvas.height - 40; c.vy *= -0.6; }
            }
        }
    }

    // --- 繪圖邏輯 ---
    function drawMap() {
        if (cameraY >= 16 * TILE_SIZE) {
            ctx.fillStyle = '#000'; ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);
        } else if (wonderMode) {
            ctx.fillStyle = `hsl(${(Date.now() / 10) % 360}, 80%, 20%)`; ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#5C94FC'; ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);
        }

        if (flagPole) { ctx.fillStyle = '#C84C0C'; ctx.fillRect(flagPole.x, flagPole.y, flagPole.w, flagPole.h); ctx.fillStyle = '#00A800'; ctx.fillRect(flagPole.x - 30, flagPole.y + 20, 30, 30); }

        for (let b of blocks) {
            if (!b.active || b.x + b.w < cameraX || b.x > cameraX + canvas.width) continue;
            let isU = b.y >= 16 * TILE_SIZE;

            if (b.type === 'G') {
                ctx.fillStyle = isU ? '#0048A8' : '#C84C0C'; ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = isU ? '#00A8F8' : '#FCEEA7'; ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 4);
                ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h);
            } 
            else if (b.type === 'B') { 
                ctx.fillStyle = isU ? '#0048A8' : '#CC4C0C'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h);
                ctx.beginPath(); ctx.moveTo(b.x, b.y+20); ctx.lineTo(b.x+40, b.y+20); ctx.stroke();
            }
            else if (b.type === '?' || b.type === 'M') { 
                ctx.fillStyle = '#F8D820'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#C84C0C'; ctx.font = 'bold 24px Arial'; ctx.fillText('?', b.x + 12, b.y + 28);
            }
            else if (b.type === 'E') { 
                ctx.fillStyle = '#C84C0C'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h);
            }
            else if (b.type === 'P' || b.type === 'T' || b.type === 'U') {
                let py = wonderMode ? b.y + Math.sin(Date.now() / 150 + b.x) * 15 : b.y;
                ctx.fillStyle = '#00A800'; ctx.fillRect(b.x, py, b.w, b.h); ctx.strokeStyle = '#000'; ctx.strokeRect(b.x, py, b.w, b.h);
                ctx.fillStyle = '#B8F818'; ctx.fillRect(b.x + 5, py, 8, b.h);
            }
        }

        for (let c of collectibles) {
            if (!c.collected && c.x + c.w > cameraX && c.x < cameraX + canvas.width) {
                ctx.fillStyle = '#F8D820'; ctx.beginPath(); ctx.ellipse(c.x + 10, c.y + 10, 8, 12, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#FFF'; ctx.fillRect(c.x + 6, c.y + 4, 2, 8);
            }
        }

        for(let e of enemies) {
            if(!e.active) continue;
            let wobble = Math.sin(Date.now() / 150 + e.x) * 2;
            ctx.fillStyle = '#8B4513'; ctx.beginPath();
            ctx.moveTo(e.x + 4, e.y + 10 - wobble); ctx.lineTo(e.x + e.w - 4, e.y + 10 + wobble);
            ctx.lineTo(e.x + e.w, e.y + e.h); ctx.lineTo(e.x, e.y + e.h); ctx.fill();
            ctx.fillStyle = '#FFDAB9'; ctx.fillRect(e.x + 6, e.y + e.h/2, e.w - 12, e.h/2 - 2);
            ctx.fillStyle = '#000'; ctx.fillRect(e.x + e.w*0.25, e.y + e.h/2+2, e.w*0.1, e.h*0.2); ctx.fillRect(e.x + e.w*0.65, e.y + e.h/2+2, e.w*0.1, e.h*0.2);
        }

        for (let m of items) {
            if (!m.active || m.x + m.w < cameraX || m.x > cameraX + canvas.width) continue;
            if (m.type === 'M') {
                ctx.fillStyle = '#F83800'; ctx.beginPath(); ctx.arc(m.x + m.w/2, m.y + m.h/2, m.w/2, Math.PI, 0); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#FFF'; ctx.fillRect(m.x + 6, m.y + m.h/2, 20, 16); ctx.strokeRect(m.x + 6, m.y + m.h/2, 20, 16);
            } else if (m.type === 'W') {
                ctx.fillStyle = `hsl(${(Date.now() / 5) % 360}, 100%, 50%)`;
                ctx.beginPath(); ctx.arc(m.x + m.w/2, m.y + m.h/2 + Math.sin(Date.now()/200)*5, m.w/2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(m.x + m.w/2, m.y + m.h/2 + Math.sin(Date.now()/200)*5, m.w/4, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    function drawEditorGrid() {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
        for(let x = 0; x <= canvas.width; x += TILE_SIZE) { ctx.beginPath(); ctx.moveTo(x - (cameraX % TILE_SIZE), 0); ctx.lineTo(x - (cameraX % TILE_SIZE), canvas.height); ctx.stroke(); }
        for(let y = 0; y <= canvas.height; y += TILE_SIZE) { ctx.beginPath(); ctx.moveTo(0, y - (cameraY % TILE_SIZE)); ctx.lineTo(canvas.width, y - (cameraY % TILE_SIZE)); ctx.stroke(); }
        
        for (let y = 0; y < mapGrid.length; y++) {
            for (let x = 0; x < mapGrid[y].length; x++) {
                let char = mapGrid[y][x];
                if (char === ' ') continue;
                let drawX = x * TILE_SIZE; let drawY = y * TILE_SIZE;
                if (drawX + TILE_SIZE < cameraX || drawX > cameraX + canvas.width) continue;

                if (char === 'G') { ctx.fillStyle='#C84C0C'; ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE); }
                else if (char === 'B') { ctx.fillStyle='#CC4C0C'; ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE); ctx.strokeRect(drawX, drawY, TILE_SIZE, TILE_SIZE); }
                else if (char === '?') { ctx.fillStyle='#F8D820'; ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE); ctx.fillStyle='#000'; ctx.fillText('?', drawX+12, drawY+28); }
                else if (char === 'M') { ctx.fillStyle='#F8D820'; ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE); ctx.fillStyle='#F83800'; ctx.fillText('M', drawX+12, drawY+28); }
                else if (char === 'C') { ctx.fillStyle='#F8D820'; ctx.beginPath(); ctx.ellipse(drawX+20, drawY+20, 8, 12, 0, 0, Math.PI*2); ctx.fill(); }
                else if (char === 'P' || char === 'T' || char === 'U') { ctx.fillStyle='#00A800'; ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE); }
                else if (char === 'F') { ctx.fillStyle='#C84C0C'; ctx.fillRect(drawX, drawY, 10, TILE_SIZE*6); }
                else if (char === 'E') { ctx.fillStyle='#8B4513'; ctx.fillRect(drawX+4, drawY+4, 32, 36); }
                else if (char === 'X') { ctx.fillStyle='#8B4513'; ctx.fillRect(drawX, drawY-32, 64, 72); ctx.fillStyle='red'; ctx.fillText('大', drawX+25, drawY+10); } 
                else if (char === 'W') { ctx.fillStyle='magenta'; ctx.beginPath(); ctx.arc(drawX+20, drawY+20, 15, 0, Math.PI*2); ctx.fill(); }
            }
        }
    }

    function gameLoop() {
        updateCamera();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(-cameraX, -cameraY);

        if (gameState === 'EDIT') {
            ctx.fillStyle = '#333'; ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);
            drawEditorGrid();
        } else {
            player1.update();
            player2.update();
            updateGameLogic();
            drawMap();
            player1.draw();
            player2.draw();
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    // 啟動遊戲
    window.onload = function() {
        generateAllLevels();
        loadLevel(1); // 從第一關開始
        requestAnimationFrame(gameLoop);
    };

</script>
